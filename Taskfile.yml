version: "3"

tasks:
  build:
    desc: Generer public/index.html + fonts (source de verite HTML)
    cmds:
      - mkdir -p public
      - bunx resume export -r manual/resume.json -t jsonresume-theme-elegant --format html public/index
      - cp -r node_modules/jsonresume-theme-elegant/assets/icomoon/fonts public/fonts

  serve:
    desc: Previsualiser le CV dans le navigateur (localhost:4000)
    deps: [build]
    cmds:
      - bunx serve public -p 4000

  export-html:
    desc: Exporter le CV en HTML autonome (output/resume.html)
    deps: [build]
    cmds:
      - mkdir -p output
      - cp public/index.html output/resume.html
      - cp -r public/fonts output/fonts

  validate:
    desc: Valider le resume.json contre le schema JSON Resume (uv)
    cmds:
      - uv run scripts/validate-json-resume.py

  audit-tags:
    desc: Auditer les tags du repo contre la taxonomie canonique (CLAUDE.md)
    cmds:
      - uv run scripts/audit-tags.py

  install:
    desc: Installer les dependances JS (bun)
    cmds:
      - bun install

  fetch-devto-adriens:
    desc: Provisionner les articles DEV.to @adriens
    cmds:
      - uv run scripts/fetch-devto-articles.py --user adriens

  fetch-devto-opt-nc:
    desc: Provisionner les articles DEV.to @optnc (ecrits par adriens uniquement)
    cmds:
      - uv run scripts/fetch-devto-articles.py --user optnc --author adriens

  fetch-devto:
    desc: Provisionner tous les articles DEV.to (sequentiel)
    cmds:
      - task: fetch-devto-adriens
      - task: fetch-devto-opt-nc

  fetch-youtube-devops-lab:
    desc: Provisionner les videos YouTube de la chaine DevOPS-LAB
    cmds:
      - uv run scripts/fetch-youtube-channel.py --channel devops-lab

  fetch-youtube-playlists-devops-lab:
    desc: Provisionner les playlists YouTube de la chaine DevOPS-LAB
    cmds:
      - uv run scripts/fetch-youtube-playlists.py --channel devops-lab

  fetch-youtube-playlists:
    desc: Provisionner les playlists de toutes les chaines YouTube (sequentiel)
    cmds:
      - task: fetch-youtube-playlists-devops-lab

  fetch-youtube:
    desc: Provisionner toutes les chaines YouTube (videos + playlists, sequentiel)
    cmds:
      - task: fetch-youtube-devops-lab
      - task: fetch-youtube-playlists-devops-lab

  fetch-goodreads-adriens:
    desc: Provisionner les livres Goodreads @adriens (etagere read)
    cmds:
      - uv run scripts/fetch-goodreads.py --user 124105866

  fetch-goodreads:
    desc: Provisionner tous les comptes Goodreads (sequentiel)
    cmds:
      - task: fetch-goodreads-adriens

  fetch-kaggle-adriensales:
    desc: Provisionner les datasets Kaggle @adriensales
    cmds:
      - uv run scripts/fetch-kaggle-datasets.py --user adriensales

  fetch-kaggle:
    desc: Provisionner tous les datasets Kaggle (sequentiel)
    cmds:
      - task: fetch-kaggle-adriensales

  fetch-hf-rastadidi:
    desc: Provisionner les datasets et spaces HuggingFace @rastadidi
    cmds:
      - uv run scripts/fetch-huggingface.py --author rastadidi

  fetch-hf:
    desc: Provisionner tous les comptes HuggingFace (sequentiel)
    cmds:
      - task: fetch-hf-rastadidi

  fetch-github-adriens:
    desc: Provisionner les repos GitHub publics non-forks @adriens
    cmds:
      - uv run scripts/fetch-github-repos.py

  fetch-github:
    desc: Provisionner tous les repos GitHub (sequentiel)
    cmds:
      - task: fetch-github-adriens

  fetch-hackster-adriensales:
    desc: Provisionner les projets Hackster.io @adriensales
    cmds:
      - uv run scripts/fetch-hackster-projects.py --user adriensales

  fetch-hackster:
    desc: Provisionner tous les comptes Hackster.io (sequentiel)
    cmds:
      - task: fetch-hackster-adriensales

  fetch-dockerhub-rastadidi:
    desc: Provisionner les images Docker Hub @rastadidi
    cmds:
      - uv run scripts/fetch-dockerhub.py --user rastadidi

  fetch-dockerhub:
    desc: Provisionner tous les comptes Docker Hub (sequentiel)
    cmds:
      - task: fetch-dockerhub-rastadidi

  fetch-pypi-rastadidi:
    desc: Provisionner les packages PyPI @rastadidi
    cmds:
      - uv run scripts/fetch-pypi-packages.py --user rastadidi --packages aquavena-sdk edb-noumea auptitcafe

  fetch-pypi:
    desc: Provisionner tous les packages PyPI (sequentiel)
    cmds:
      - task: fetch-pypi-rastadidi

  build-knowledge-base:
    desc: Generer output/knowledge-base.md pour injection NotebookLM (full)
    cmds:
      - uv run scripts/build-knowledge-base.py

  build-knowledge-base-lite:
    desc: Generer output/knowledge-base.md (lite, frontmatters uniquement)
    cmds:
      - uv run scripts/build-knowledge-base.py --lite

  build-okf:
    desc: Generer output/okf/ — bundle Open Knowledge Format v0.1 (graphe x-tags)
    cmds:
      - uv run scripts/build-okf.py

  build-okf-viz:
    desc: Generer output/okf/viz.html — graphe HTML interactif du bundle OKF
    deps: [build-okf]
    cmds:
      - uv run --with pyyaml scripts/build-okf-viz.py

  fetch-all:
    desc: Fetch toutes les sources + genere le knowledge base
    cmds:
      - task: fetch-devto
      - task: fetch-youtube
      - task: fetch-goodreads
      - task: fetch-kaggle
      - task: fetch-hf
      - task: fetch-github
      - task: fetch-hackster
      - task: fetch-dockerhub
      - task: fetch-pypi
      - task: build-knowledge-base

  site-install:
    desc: Installer les dependances Astro (site/)
    cmds:
      - cd site && bun install

  site-dev:
    desc: Lancer le site portfolio en mode dev (localhost:4321)
    deps: [site-install]
    cmds:
      - cd site && bun run dev

  site-build:
    desc: Generer le site portfolio statique (site/dist/)
    deps: [site-install]
    cmds:
      - cd site && bun run build

  site-preview:
    desc: Previsualiser le build statique du portfolio
    deps: [site-build]
    cmds:
      - cd site && bun run preview

  clean:
    desc: Supprimer les fichiers generes et les dependances
    cmds:
      - rm -rf public output node_modules .venv site/node_modules site/dist site/.astro
