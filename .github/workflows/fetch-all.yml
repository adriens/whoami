name: Monthly fetch-all

on:
  schedule:
    - cron: "0 3 1 * *"  # 1er du mois à 3h UTC
  workflow_dispatch:      # déclenchement manuel possible

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS deps
        run: bun install

      - name: Fetch all sources
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run scripts/fetch-devto-articles.py --user adriens
          uv run scripts/fetch-devto-articles.py --user optnc --author adriens
          uv run scripts/fetch-youtube-channel.py --channel devops-lab
          uv run scripts/fetch-goodreads.py --user 124105866
          uv run scripts/fetch-kaggle-datasets.py --user adriensales
          uv run scripts/fetch-huggingface.py --author rastadidi
          uv run scripts/fetch-github-repos.py
          uv run scripts/build-knowledge-base.py --lite

      - name: Create PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BASE_BRANCH="data/refresh-${DATE}"
          BASE_TAG="data-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${BASE_BRANCH}"
          TAG="${BASE_TAG}"
          n=1
          while git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1 \
             || git ls-remote --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; do
            BRANCH="${BASE_BRANCH}.${n}"
            TAG="${BASE_TAG}.${n}"
            n=$((n + 1))
          done
          echo "Branch: ${BRANCH}, Tag: ${TAG}"

          git checkout -b "${BRANCH}"
          git add data/

          if git diff --cached --quiet; then
            echo "Aucune nouvelle donnée, pas de PR."
            exit 0
          fi

          git commit -m "chore: monthly data refresh ${DATE}"
          git tag "${TAG}"
          git push origin "${BRANCH}"
          git push origin "refs/tags/${TAG}"

          PR_URL=$(gh pr create \
            --title "chore: data refresh ${DATE}" \
            --body "Refresh mensuel automatique des données (DEV.to, YouTube, Goodreads, Kaggle, HuggingFace, GitHub)." \
            --base main \
            --head "${BRANCH}")

          echo "PR créée : ${PR_URL}"
          gh pr merge "${PR_URL}" --merge --delete-branch

          gh release create "${TAG}" \
            --title "Data refresh ${DATE}" \
            --notes "Refresh mensuel automatique des données (DEV.to, YouTube, Goodreads, Kaggle, HuggingFace, GitHub)." \
            --target main
