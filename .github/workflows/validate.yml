name: Validate resume.json

on:
  push:
    paths:
      - "manual/resume.json"
      - "scripts/validate-json-resume.py"
      - "scripts/audit-tags.py"
      - "CLAUDE.md"
      - "data/**/*.md"
  pull_request:
    paths:
      - "manual/resume.json"
      - "scripts/validate-json-resume.py"
      - "scripts/audit-tags.py"
      - "CLAUDE.md"
      - "data/**/*.md"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Validate resume.json
        run: uv run scripts/validate-json-resume.py

      - name: Audit x-tags taxonomy
        run: uv run scripts/audit-tags.py
