name: Validate resume.json

on:
  push:
    paths:
      - "manual/resume.json"
      - "scripts/validate-json-resume.py"
  pull_request:
    paths:
      - "manual/resume.json"
      - "scripts/validate-json-resume.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Validate resume.json
        run: uv run scripts/validate-json-resume.py
