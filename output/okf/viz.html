* { box-sizing: border-box; }
body {

.controls input, .controls select, .controls button {

  border-radius: 4px;

.controls input { width: 220px; }
.controls button { cursor: pointer; background: #f1f5f9; }
.controls button:hover { background: #e2e8f0; }

main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  background: #fff;
  border-right: 1px solid #e2e8f0;

}
#detail {

}
#detail-empty {

}

.detail-header { margin-bottom: 12px; }
.detail-header h1 {

}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: #94a3b8;

}
dl.frontmatter {

  column-gap: 12px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt {
  color: #64748b;
  font-weight: 500;
}
dl.frontmatter dd { margin: 0; }
dl.frontmatter a { color: #2563eb; word-break: break-all; }

.tag {
  display: inline-block;
  padding: 1px 6px;
  margin: 0 4px 2px 0;
  border-radius: 4px;
  background: #f1f5f9;
  color: #475569;
  font-size: 11px;
}

hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }

#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  font-size: 16px; margin: 18px 0 6px;
  padding-bottom: 4px; border-bottom: 1px solid #e2e8f0;
}
#detail-body h2 { font-size: 14px; margin: 14px 0 4px; }
#detail-body h3 { font-size: 13px; margin: 12px 0 4px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  background: #f1f5f9;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
}
#detail-body pre {
  background: #0f172a;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 12px;
}
#detail-body pre code { background: transparent; color: inherit; padding: 0; }
#detail-body ul, #detail-body ol { padding-left: 22px; margin: 6px 0; }
#detail-body li { margin: 2px 0; }
#detail-body table { border-collapse: collapse; margin: 8px 0; }
#detail-body th, #detail-body td {

#detail-body a.internal { color: #2563eb; cursor: pointer; }

#detail-backlinks h2 { font-size: 13px; color: #64748b; margin-bottom: 6px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: #2563eb; cursor: pointer; }

</style>

<body>
<header>
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title / id / tag">
    <select id="filter-type">
      <option value="">All types</option>
    </select>
    <select id="layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset">Reset view</button>
  </div>
</header>

<main>
  <section id="graph"></section>
  <section id="detail">
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

e9matiques (concours national s\u00e9lectif) pendant la p\u00e9riode d'enseignement en coll\u00e8ge en Nouvelle-Cal\u00e9donie (1999\u20132001).\n\n*D\u00e9cern\u00e9 par : Minist\u00e8re de l'\u00c9ducation Nationale*\n\n**Tags :** [pedagogy](../tags/pedagogy.md), [recognition](../tags/recognition.md)", "awards/arctic-code-vault-contributor-github": "Code archiv\u00e9 dans le GitHub Arctic Code Vault pour pr\u00e9servation mill\u00e9naire.\n\n*D\u00e9cern\u00e9 par : GitHub*\n\n**Tags :** [international](../tags/international.md), [open-source](../tags/open-source.md), [recognition](../tags/recognition.md)", "awards/extension-officielle-duckdb-community-brew": "Extension brew list\u00e9e sur duckdb.org/community_extensions permettant de requ\u00eater les packages Homebrew install\u00e9s directement en SQL. Construite pendant le GitHub Copilot CLI Challenge, activement maintenue. https://duckdb.org/community_extensions/extensions/brew\n\n*D\u00e9cern\u00e9 par : DuckDB*\n\n**Tags :** [data](../tags/data.md), [duckdb](../tags/duckdb.md), [international](../tags/international.md), [maintainer](../tags/maintainer.md), [open-source](../tags/open-source.md), [recognition](../tags/recognition.md)", "awards/hacktoberfest-maintainer-spotlight-geol": "Mise en avant officielle comme mainteneur open source pour le projet geol lors du Hacktoberfest 2025. https://dev.to/adriens/geol-the-cli-to-efficiently-manage-eols-like-a-boss-3hne\n\n*D\u00e9cern\u00e9 par : DEV Community / Hacktoberfest*\n\n**Tags :** [devsecops](../tags/devsecops.md), [go](../tags/go.md), [international](../tags/international.md), [maintainer](../tags/maintainer.md), [open-source](../tags/open-source.md), [recognition](../tags/recognition.md)", "awards/mentor-pepite-nc-2025-equipe-waza-laureate": "Mentor du programme P\u00e9pite NC 2025 aupr\u00e8s de l'\u00e9quipe WAZA (D\u00e9vi Berg\u00e8s, Tina Nak, James Langeron, Raimanu Pain \u2014 \u00e9tudiants MIAGE UNC). Application de mise en relation chauffeurs/passagers. 3\u00e8me place + Prix sp\u00e9cial Lagoon (100 000 CFP). Mentorat sollicit\u00e9 directement par les \u00e9tudiants.\n\n*D\u00e9cern\u00e9 par : P\u00e9pite NC / Bpifrance / Prix Lagoon*\n\n**Tags :** [civic-tech](../tags/civic-tech.md), [mentor](../tags/mentor.md), [mentorat](../tags/mentorat.md), [pedagogy](../tags/pedagogy.md), [transmission](../tags/transmission.md)", "awards/notebooks-expert-kaggle": "Top 5% mondial des contributeurs Kaggle \u2014 rang 3 005 / 62 173. 6 m\u00e9dailles de bronze, 27 datasets publi\u00e9s, 81 notebooks, participation r\u00e9guli\u00e8re aux hackathons.\n\n*D\u00e9cern\u00e9 par : Kaggle (Google)*\n\n**Tags :** [data](../tags/data.md), [international](../tags/international.md), [python](../tags/python.md), [recognition](../tags/recognition.md)", "awards/speaker-elastic-paris-meetup-58": "Talk : Linter et cartographier ses bases de donn\u00e9es en continu avec SchemaCrawler et Elasticsearch. https://www.youtube.com/watch?v=5B5mGAeaHwA\n\n*D\u00e9cern\u00e9 par : Elastic*\n\n**Tags :** [data](../tags/data.md), [devsecops](../tags/devsecops.md), [elk-stack](../tags/elk-stack.md), [international](../tags/international.md), [speaker](../tags/speaker.md)", "awards/speaker-nodes-2022-conference-internationale-neo4j": "Talk : IT Holism at NODES 2022 \u2014 premi\u00e8re pr\u00e9sentation du knowledge graph SI de l'OPT-NC, vision holistique du SI par le graphe. https://dev.to/optnc/our-speech-about-it-holism-at-nodes22-1bpl\n\n*D\u00e9cern\u00e9 par : Neo4j*\n\n**Tags :** [architecture](../tags/architecture.md), [international](../tags/international.md), [knowledge-graph](../tags/knowledge-graph.md), [neo4j](../tags/neo4j.md), [speaker](../tags/speaker.md)", "awards/speaker-nodes-2023-conference-internationale-neo4j": "Pr\u00e9sentation : Discover a Country's UN SDGs Concerns w/ Open Metadata on Neo4j \u2014 analyse des pr\u00e9occupations ODD des Nations Unies via open data et knowledge graph. https://dev.to/adriens/discover-a-country-un-sdgs-concerns-w-open-metadata-on-neo4j-13df\n\n*D\u00e9cern\u00e9 par : Neo4j*\n\n**Tags :** [civic-tech](../tags/civic-tech.md), [international](../tags/international.md), [knowledge-graph](../tags/knowledge-graph.md), [neo4j](../tags/neo4j.md), [open-data](../tags/open-data.md), [speaker](../tags/speaker.md)", "awards/speaker-nodes-2024-conference-internationale-neo4j": "3\u00e8me participation cons\u00e9cutive (NODES22 \u2192 NODES23 \u2192 NODES24) \u2014 CFP s\u00e9lectionn\u00e9 : Cloud-Native Knowledge Graph Automation & AI Agents. Cartographie du SI OPT-NC avec Neo4j, release automatis\u00e9e et agents IA. Vid\u00e9os CFP publiques : https://youtu.be/KFfIgERRjA4 (full) \u00b7 https://youtu.be/9MxVcMB_RWE (medium) \u00b7 https://youtu.be/8H5msX4Qp1E (shortest). Article : https://dev.to/adriens/nodes24-a-practical-path-to-cloud-native-knowledge-graph-automation-ai-agents-2ejh\n\n*D\u00e9cern\u00e9 par : Neo4j*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [architecture](../tags/architecture.md), [devrel](../tags/devrel.md), [international](../tags/international.md), [knowledge-graph](../tags/knowledge-graph.md), [neo4j](../tags/neo4j.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [speaker](../tags/speaker.md)", "awards/speaker-pmi-horizons-noumea-project-management-institute-2": "1\u00e8re participation au PMI Horizons Noum\u00e9a \u2014 Talk : Neo4j & AI Agents et impacts projets \u2014 pr\u00e9sentation de l'usage des knowledge graphs et agents IA dans la gestion de projets SI. https://www.youtube.com/watch?v=ErBCyOrup3M\n\n*D\u00e9cern\u00e9 par : PMI Nouvelle-Cal\u00e9donie*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [knowledge-graph](../tags/knowledge-graph.md), [management](../tags/management.md), [neo4j](../tags/neo4j.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [pacifique](../tags/pacifique.md), [speaker](../tags/speaker.md)", "awards/speaker-pmi-horizons-noumea-project-management-institute": "2\u00e8me participation cons\u00e9cutive \u2014 Expos\u00e9 : \"D\u00e9velopper mieux. Plus vite. Plus inclusif.\" Th\u00e8me de l'\u00e9v\u00e9nement : \"L'innovation n'a de valeur que lorsqu'elle cr\u00e9e davantage d'inclusion, d'accessibilit\u00e9 et de capacit\u00e9 d'agir.\" Point de d\u00e9part : un proche en perte d'autonomie incapable de lire un document pour passer commande \u2014 z\u00e9ro expertise pr\u00e9alable en accessibilit\u00e9. Approche Design Thinking outill\u00e9e (Agile, DevOps/CI-CD, Data Science, ML, Graph Data Science, IA) pour concevoir un service accessible quel que soit le handicap ou le contexte. M\u00e9triques projet : LEAD Time & DORA. Framework data-driven, open source, avec d\u00e9monstration live et t\u00e9moignages utilisateur. Succ\u00e8s mesur\u00e9 au gain d'autonomie (nul, partiel ou total). Avant-premi\u00e8re du robot Reachy Mini (Pollen Robotics) : agent vocal recommandant des menus Aquavena \u00e0 un profil sportif triathlon \u2014 d\u00e9mo live d\u00e9di\u00e9e \u00e0 Aquavena. 4 juillet 2026. Vid\u00e9o : https://www.youtube.com/watch?v=hcXYVpWKjqA\n\n*D\u00e9cern\u00e9 par : PMI France \u2013 Branche Horizons, P\u00f4le Nouvelle-Cal\u00e9donie*\n\n**Tags :** [accessibility](../tags/accessibility.md), [ai-agents](../tags/ai-agents.md), [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [design-thinking](../tags/design-thinking.md), [devsecops](../tags/devsecops.md), [embeddings](../tags/embeddings.md), [human-centric](../tags/human-centric.md), [interoperability](../tags/interoperability.md), [iot](../tags/iot.md), [knowledge-graph](../tags/knowledge-graph.md), [lean](../tags/lean.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [speaker](../tags/speaker.md)", "awards/speaker-talanoa-2022-pacific-dataviz-challenge-spc": "Pr\u00e9sentation sur la puissance de la dataviz pour le Pacific DataViz Challenge, \u00e9v\u00e9nement r\u00e9gional organis\u00e9 par la Commission du Pacifique Sud. Talk sur Neo4j et Gephi comme outils de visualisation de donn\u00e9es au service de la prise de d\u00e9cision. https://dev.to/optnc/talanoa-2022-the-power-of-data-visualization-1fgn\n\n*D\u00e9cern\u00e9 par : Pacific Community \u2014 SPC*\n\n**Tags :** [data](../tags/data.md), [international](../tags/international.md), [neo4j](../tags/neo4j.md), [open-data](../tags/open-data.md), [pacifique](../tags/pacifique.md), [speaker](../tags/speaker.md)", "certificates/product-owner": "*\u00c9metteur : Scrum Alliance*\n\n**Tags :** [management](../tags/management.md), [product](../tags/product.md), [recognition](../tags/recognition.md), [scrum](../tags/scrum.md)", "certificates/scrum-master": "*\u00c9metteur : Scrum Alliance*\n\n**Tags :** [management](../tags/management.md), [recognition](../tags/recognition.md), [scrum](../tags/scrum.md)", "education/ceram-business-school-skema-sophia-antipolis-bases-de-donnees-et-progiciels-erp": "**Mast\u00e8re Sp\u00e9cialis\u00e9 MSBDS \u2014 labellis\u00e9 Conf\u00e9rence des Grandes \u00c9coles** \u2014 Bases de donn\u00e9es et Progiciels / ERP @ CERAM Business School (Skema) \u2014 Sophia Antipolis\n\n- Stage de fin d'\u00e9tudes en data mining, en collaboration avec l'I3S (laboratoire CNRS \u2014 Sophia Antipolis) et Experian Decision Analytics \u2014 transform\u00e9 en embauche directe d\u00e8s la fin du stage", "education/ecole-montessori-les-pouces-verts-mouans-sartoux-pedagogie-montessori": "**\u00c9cole primaire** \u2014 P\u00e9dagogie Montessori @ \u00c9cole Montessori Les Pouces Verts \u2014 Mouans-Sartoux\n\n- Fondation d'une posture cognitive durable : apprendre par la manipulation, progresser \u00e0 son rythme, construire sa propre compr\u00e9hension\n- Fil rouge p\u00e9dagogique : la m\u00eame philosophie \u2014 autonomie, projets r\u00e9els, apprendre en faisant \u2014 se retrouve 45 ans plus tard dans l'enseignement en Master MIAGE et le mentorat de stagiaires", "education/universite-de-la-nouvelle-caledonie-mathematiques": "**Licence** \u2014 Math\u00e9matiques @ Universit\u00e9 de la Nouvelle-Cal\u00e9donie", "education/universite-de-nice-sophia-antipolis-mathematiques-appliquees": "**DEA (Dipl\u00f4me d'\u00c9tudes Approfondies)** \u2014 Math\u00e9matiques Appliqu\u00e9es @ Universit\u00e9 de Nice Sophia-Antipolis\n\n- Stage de recherche : INRIA Sophia Antipolis (https://www.inria.fr) \u2014 impl\u00e9mentation C++ de LINPACK, biblioth\u00e8que de r\u00e9f\u00e9rence en alg\u00e8bre lin\u00e9aire num\u00e9rique haute performance", "education/universite-de-nice-sophia-antipolis-mathematiques-fondamentales": "**Ma\u00eetrise** \u2014 Math\u00e9matiques Fondamentales @ Universit\u00e9 de Nice Sophia-Antipolis", "education/universite-de-nice-sophia-antipolis-mathematiques-informatique-et-applications-aux-sciences": "**DEUG MIASS** \u2014 Math\u00e9matiques - Informatique et Applications aux Sciences @ Universit\u00e9 de Nice Sophia-Antipolis", "interests/creation-de-contenu-humour-tech": "Mots-cl\u00e9s : D\u00e9tournements vid\u00e9o, Films VO russe/allemand sous-titr\u00e9s fran\u00e7ais, M\u00e8mes tech, Storytelling technique\n\n*Contexte : mixed*", "interests/ecriture": "Mots-cl\u00e9s : Livre sur la data en entreprise, Recueil de nouvelles, Vulgarisation tech\n\n*Contexte : mixed*", "interests/lecture": "Mots-cl\u00e9s : Management, Architecture logicielle, Data science, Innovation, Design Thinking, UX Strategy, Start with Why, Data Products, Systems Thinking\n\n*Contexte : pro*\n\n**Tags :** [architecture-logicielle](../tags/architecture-logicielle.md), [data-science](../tags/data-science.md), [design-thinking](../tags/design-thinking.md), [innovation](../tags/innovation.md), [management](../tags/management.md)", "interests/maker-iot": "Mots-cl\u00e9s : Lo-tech, Arduino, ESP8266 / NodeMCU, Arduino MKR1000, Raspberry Pi Pico W, Pimoroni Cosmic Unicorn, LED matrix, API vers IoT, Meshtastic, MeshCore, LoRa mesh networking, IoT outdoor, Fablab UNC, Adafruit / CircuitPython, eInk displays, BBC micro:bit, Hackster.io\n\n*Contexte : mixed*", "interests/musique": "Mots-cl\u00e9s : Jazz\n\n*Contexte : personal*", "interests/sports-outdoor-nautiques": "Mots-cl\u00e9s : Course \u00e0 pied, Natation open water, Monopalme, Prone paddle, Windsurf, Wingfoil, V\u00e9lo, Street workout\n\n*Contexte : personal*", "interests/veille-technologique-innovation": "Mots-cl\u00e9s : Livres tech, Livres management, Architecture SI, Intelligence artificielle, Open source, Vibe coding Go\n\n*Contexte : pro*\n\n**Tags :** [open-source](../tags/open-source.md)", "profile/adrien-sales": "Ma sp\u00e9cificit\u00e9 : face \u00e0 n'importe quelle probl\u00e9matique, je reconnais la famille de probl\u00e8mes \u00e0 laquelle elle appartient \u2014 et j'en tire imm\u00e9diatement les r\u00e9f\u00e9rentiels, les structures de donn\u00e9es et les outils adapt\u00e9s, qu'ils soient math\u00e9matiques ou data. Form\u00e9 en math\u00e9matiques (DEA Math\u00e9matiques Appliqu\u00e9es \u2014 stage de recherche INRIA Sophia Antipolis) puis en data science (Mast\u00e8re Sp\u00e9cialis\u00e9 MSBDS \u2014 labellis\u00e9 Conf\u00e9rence des Grandes \u00c9coles, stage data mining avec l'I3S CNRS), je mod\u00e9lise, lie, package, puis exploite par des agents IA pour cr\u00e9er de la valeur r\u00e9elle. Et je travaille avec ce qui existe : open data, scraping, APIs publiques \u2014 innovation frugale et design thinking comme levier, pas comme contrainte. M\u00e9thode signature : l'API-fication \u2014 identifier un manque d'interop\u00e9rabilit\u00e9, scraper ou exploiter l'open data, packager en SDK, exposer en API, laisser \u00e9merger l'\u00e9cosyst\u00e8me communautaire (apps mobiles, AR, bots, MCPs, dashboards). Valid\u00e9 sur domaine.nc, ColisNC, edb-noumea, kalolo, RIDET, smartcity Noum\u00e9a.\n\nIng\u00e9nieur architecte SI passionn\u00e9 par le d\u00e9veloppement de produits et le leadership technique, je manage des d\u00e9veloppeurs, innove en LEAN et construis des syst\u00e8mes data end-to-end : Lakehouse (DuckLake/Airflow/Kafka), knowledge graph Neo4j du SI OPT-NC, MCPs open source et agents IA. Ma boussole : l'expertise technique au service du besoin m\u00e9tier et du time-to-market \u2014 chaque choix d'architecture se mesure \u00e0 la valeur livr\u00e9e.\n\n25 ans de parcours : professeur de maths en coll\u00e8ge, consultant DB chez Experian (Orange, BofA, Cr\u00e9dit Lyonnais), DBA expert chez Docaposte (HADOPI, Infogreffe), architecte logiciel \u00e0 la DSI de Noum\u00e9a, aujourd'hui Chef de Section GLIA \u00e0 l'OPT-NC. Contributeur open source actif (DuckDB, endoflife.date, geol \u2014 Hacktoberfest Spotlight 2025), auteur de 206 articles sur Dev.to, top 5% Kaggle, speaker NODES 2022, 2023 & 2024. Enseignant en Master MIAGE avec une p\u00e9dagogie Montessori : projets r\u00e9els, open source, #techforgood. Outcomes mesurables : deux \u00e9tudiants de la promo 2025 recrut\u00e9s dans des institutions publiques cal\u00e9doniennes (OPT-NC, ISEE-NC) sur recommandation active \u2014 la p\u00e9dagogie comme levier de placement, pas seulement de formation. La boucle se referme : la transmission, premier m\u00e9tier en 1999 (professeur de math\u00e9matiques en coll\u00e8ge), revient au premier plan 25 ans plus tard \u2014 fil rouge plus que parenth\u00e8se.\n\nConviction transversale, valable pour moi comme pour les collaborateurs et stagiaires que j'encadre : un rythme soutenable sur la dur\u00e9e prime sur le sprint. Six ans de projets tutor\u00e9s sans interruption, des s\u00e9ries d'articles r\u00e9guli\u00e8res, des contributions open source continues \u2014 l'endurance comme m\u00e9thode, pas comme contrainte.\n\nAmbitions parall\u00e8les : construire un produit data/IA ancr\u00e9 dans les probl\u00e9matiques du Pacifique, contribuer \u00e0 la recherche appliqu\u00e9e (knowledge graphs, data science), et \u00e9tendre une pr\u00e9sence DevRel internationale \u2014 conf\u00e9rences, open source, communaut\u00e9.\n\n*Localisation : Noum\u00e9a, NC*\n\n**Profils :**\n- [GitHub](https://github.com/adriens/)\n- [LinkedIn](https://linkedin.com/in/adrien-sales/)\n- [Dev.to](https://dev.to/adriens/)\n- [YouTube](https://www.youtube.com/channel/UCcbQ_euR84DKOf_-ksI5_GQ)\n- [Kaggle](https://www.kaggle.com/adriensales)\n- [X (Twitter)](https://twitter.com/rastadidi)\n- [PyPI](https://pypi.org/user/rastadidi/)\n- [Goodreads](https://www.goodreads.com/user/show/124105866-adrien)\n- [HuggingFace](https://huggingface.co/rastadidi)\n- [Chocolatey](https://community.chocolatey.org/profiles/adriens)\n- [Hackster.io](https://www.hackster.io/adriensales)\n- [Docker Hub](https://hub.docker.com/u/rastadidi)\n- [Ko-fi](https://ko-fi.com/rastadidi)\n- Zenodo: adriens", "projects/api-domaine-nc-creation-de-l-interoperabilite-des-noms-de-domaine-nc": "Avant ce projet : aucune API, aucune interop\u00e9rabilit\u00e9 possible sur les donn\u00e9es des noms de domaine .NC. Scraping du site domaine.nc (aucune API officielle) \u2192 API expos\u00e9e sur la marketplace APIGEE grand public de l'OPT-NC + dataset open data Kaggle. Effet multiplicateur : une application mobile Flutter open source d\u00e9velopp\u00e9e par la communaut\u00e9, publi\u00e9e sur le Google Play Store et test\u00e9e en crowdtesting.\n- Z\u00e9ro interop\u00e9rabilit\u00e9 avant ce projet \u2014 scraping du site domaine.nc (pas d'API officielle) \u2192 premi\u00e8re et unique API publique des noms de domaine .NC\n- Dataset open data Kaggle : New Caledonia .NC Domains Database \u2014 notebooks Jupyter, graph Neo4j AuraDB + tableau de bord NeoDash\n- App mobile Flutter open source tierce : 25 releases (v1.4.2 oct. 2025), 7 stars, 2 forks, Google PlayStore\n- Test\u00e9e en crowdtesting professionnel via Hightest/Testeum \u2014 t\u00e9moignage publi\u00e9\n- **Saga compl\u00e8te : 12 articles Dev.to** (avr. 2022 \u2192 d\u00e9c. 2023) \u2014 Docker, GH Actions, RapidAPI, Killercoda, Neo4j/NeoDash, mobile PlayStore, Kaggle + s\u00e9rie mobile\n- **21 vid\u00e9os playlist DOMAINE.nc** \u2014 https://www.youtube.com/playlist?list=PL7GdrgVAWcDgTfeJKnrK2MyeKCxJWNs03 | **5 vid\u00e9os playlist Mobile** \u2014 https://www.youtube.com/playlist?list=PL7GdrgVAWcDilGJGeNuVdvCM-lSmt5DNT\n- Pattern complet : probl\u00e8me identifi\u00e9 \u2192 API \u2192 open data \u2192 app mobile \u2192 \u00e9cosyst\u00e8me communautaire\n\n*Type : professional*\n\n**Tags :** [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [flutter](../tags/flutter.md), [interoperability](../tags/interoperability.md), [java](../tags/java.md), [mobile](../tags/mobile.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [saga](../tags/saga.md), [scraping](../tags/scraping.md)", "projects/api-fication-caledonienne-sdks-java-apis-rest": "D\u00e9marche syst\u00e9matique de cr\u00e9ation d'interop\u00e9rabilit\u00e9 l\u00e0 o\u00f9 elle n'existe pas \u2014 deux familles. Scraping : reverse-engineering de sites sans API \u2192 SDK Java (JitPack/Travis CI) \u2192 API REST Spring Boot (Heroku) \u2192 int\u00e9grations mobiles et no-code. Open data & original : sources officielles (data.gouv.nc) ou contenu original \u2192 m\u00eame stack, donn\u00e9es durables. S\u00e9rie LinkedIn Pulse API-fication S01/S02 + plusieurs articles DEV.to.\n- Scraping \u2014 tickets-resto-nc-sdk (HtmlUnit, JitPack) + API Spring Boot : tickets restaurant NC (neocarte.nc) \u2014 aboutit \u00e0 une app mobile Kotlin/Android en 3 week-ends de dev lean (LinkedIn S02E01)\n- Scraping \u2014 carte-conso-plus : SDK Java (JitPack) + API Spring Boot (Heroku) pour la carte Conso+ NC \u2014 solde, partenaires, magazines, Google Sheets ; puis app mobile Kotlin/Android MVP (2019) et refonte Flutter open innovation (2020)\n- Scraping \u2014 cine-city-noumea : SDK Java (JitPack) + API REST Spring Boot pour le cin\u00e9ma CineCity NC. Aujourd'hui hors service (refonte upstream \u2014 m\u00eame cause que mon-1012-nc)\n- Scraping \u2014 eaux-baignade-noumea : scraping donn\u00e9es publiques Ville de Noum\u00e9a + SDK Java + BeachCagouBot (bot Twitter CircleCI cron) \u2014 gen\u00e8se directe du projet edb-noumea (LinkedIn S01E04)\n- Scraping \u2014 mon-1012-nc : API Spring Boot sur l'annuaire 1012.nc (num\u00e9ros Mobilis) \u2014 prototyp\u00e9e pour une app React/React Native (LinkedIn S01E04). Aujourd'hui hors service : refonte compl\u00e8te du site source ayant cass\u00e9 le scraper \u2014 illustration concr\u00e8te du co\u00fbt de maintenance des approches scraping vs API officielle (et argument fort pour la strat\u00e9gie catalogue APIGEE OPT-NC)\n- Scraping \u2014 scalair4j (JitPack) + noumea-smartcity-api (Heroku) : SDK Java + hub d'APIs agr\u00e9geant la qualit\u00e9 de l'air NC (Scal-Air) et autres endpoints smart city Noum\u00e9a. Statut actuel : h\u00e9bergement Heroku abandonn\u00e9. \u00c9volution pr\u00e9vue : refonte Python (uv) + app HuggingFace Spaces + MCP \u2014 modernisation compl\u00e8te de la stack avec les outils data/IA actuels\n- Open data \u2014 ridetnc4j (JitPack) + ridetnc-api : SDK Java + API REST sur le registre RIDET officiel (data.gouv.nc) \u2014 **136 pulls** Docker Hub \u2014 2 articles DEV.to (2021, 2023)\n- Original \u2014 kalolo-api / kalolo-2.0 : API d'expressions caldoches publi\u00e9e sur la marketplace RapidAPI \u2014 **127 pulls** Docker Hub \u2014 article DEV.to + LinkedIn 2020. \u00c9volution pr\u00e9vue : dataset open d'expressions caldoches + MCP (Model Context Protocol) \u2014 exposition directe aux clients LLM (Claude, etc.) pour conversations localis\u00e9es NC, d\u00e9marche d'inclusivit\u00e9 culturelle Pacifique dans les agents IA\n- Original \u2014 excuses-sdk (JitPack) + excuses-api : SDK Java + API REST, m\u00eame pattern appliqu\u00e9 \u00e0 du contenu humoristique. \u00c9volution pr\u00e9vue : dataset open d'excuses + MCP \u2014 donner du caract\u00e8re/humour aux agents IA via Model Context Protocol, exemple typique d'augmentation conversationnelle ludique\n\n*Type : open-source*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [huggingface](../tags/huggingface.md), [interoperability](../tags/interoperability.md), [java](../tags/java.md), [mcp](../tags/mcp.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [python](../tags/python.md), [scraping](../tags/scraping.md), [umbrella](../tags/umbrella.md)", "projects/aquavena-sdk-python-scraping-menus-tarifs-aquavena-nc": "SDK Python + CLI pour scraper les menus et tarifs d'Aquavena, service de livraison de repas di\u00e9t\u00e9tiques en Nouvelle-Cal\u00e9donie. Support de 8+ r\u00e9gimes alimentaires (m\u00e9diterran\u00e9en, low carb, v\u00e9g\u00e9tarien, sportif\u2026), tarifs en XPF, filtrage par jour. Int\u00e9gration Claude Skill + HuggingFace Space. D\u00e9clencheur : un proche malvoyant incapable de lire les menus pour passer commande \u2014 z\u00e9ro expertise accessibilit\u00e9 pr\u00e9alable, approche Design Thinking.\n- Package PyPI `aquavena-sdk` (Python \u22653.13) \u2014 SDK + CLI autonome\n- 8+ r\u00e9gimes : menus hebdomadaires d\u00e9taill\u00e9s (d\u00e9jeuner/d\u00eener, suppl\u00e9ments, boissons) + tarifs complets\n- HuggingFace MCP Space : rastadidi/aquavena \u2014 serveur MCP pour acc\u00e8s aux menus depuis les agents IA (cr\u00e9\u00e9 mai 2026) + Claude Skill d\u00e9di\u00e9 + documentation GitHub Pages\n- Score accessibilit\u00e9 Aquavena 90\u2192100% / site PWA Astro 81\u2192100% \u2014 31 erreurs WCAG \u2192 0 \u2014 DORA Scorecard \u00e9lite (lead time 15 min, 2,5 d\u00e9ploiements/jour, MTTR <1h)\n- Avant-premi\u00e8re live au PMI Horizons Noum\u00e9a (4 juillet 2026) \u2014 robot Reachy Mini (Pollen Robotics) recommande un menu Aquavena \u00e0 un sportif triathlon, d\u00e9mo d\u00e9di\u00e9e : recommandation par embeddings (matching s\u00e9mantique profil \u2194 menus) \u2014 https://www.youtube.com/watch?v=hcXYVpWKjqA\n\n*Type : open-source*\n\n**Tags :** [accessibility](../tags/accessibility.md), [ai-agents](../tags/ai-agents.md), [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [embeddings](../tags/embeddings.md), [frugal](../tags/frugal.md), [human-centric](../tags/human-centric.md), [iot](../tags/iot.md), [lean](../tags/lean.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [python](../tags/python.md), [scraping](../tags/scraping.md)", "projects/auptitcafe-sdk-scraping-cafes-restaurants-nc": "Package PyPI de scraping des donn\u00e9es de caf\u00e9s et restaurants en Nouvelle-Cal\u00e9donie : prix, noms de plats, recettes et images. Pipeline complet de donn\u00e9es avec GitHub Actions pour l'archivage live, dataset et notebooks Kaggle, agent chat HuggingFace et s\u00e9rie d\u00e9di\u00e9e sur Dev.to.\n- Package PyPI maintenu avec GitHub Action d'archivage des donn\u00e9es en continu\n- Dataset Kaggle + notebooks d'analyse explor\u00e9e\n- Agent HuggingFace Chat pour interroger les donn\u00e9es en langage naturel\n- S\u00e9rie d\u00e9di\u00e9e sur Dev.to : https://dev.to/adriens/series/23071\n\n*Type : open-source*\n\n**Tags :** [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [python](../tags/python.md), [saga](../tags/saga.md), [scraping](../tags/scraping.md)", "projects/bp-connectee-monitoring-rack-boites-postales-opt-nc": "PoC IoT instrumentant un rack complet de bo\u00eetes postales (BP) OPT-NC : d\u00e9tection laser par case + communication Zigbee basse consommation \u2192 g\u00e9n\u00e9ration d'events dans le SI \u2192 notification client \u00e0 la d\u00e9pose du courrier. Co-con\u00e7u avec des \u00e9l\u00e8ves de la fili\u00e8re num\u00e9rique et \u00e9lectronique du Lyc\u00e9e du Mont-Dore. D\u00e9monstration interne DSI en pr\u00e9sence du DSI, du professeur, des \u00e9l\u00e8ves et de la section GLIA. PoC sans suite d\u00e9cisionnelle de l'OPT.\n- Monitoring \u00e0 l'\u00e9chelle du rack : un capteur laser par case, mesh Zigbee basse consommation \u2014 z\u00e9ro c\u00e2blage r\u00e9seau suppl\u00e9mentaire\n- Valeur m\u00e9tier : notification client \u00e0 la d\u00e9pose du courrier \u2192 \u00e9limine les d\u00e9placements inutiles sans effort suppl\u00e9mentaire pour le personnel postal\n- Co-conception p\u00e9dagogique avec \u00e9l\u00e8ves fili\u00e8re num\u00e9rique & \u00e9lectronique, Lyc\u00e9e du Mont-Dore\n- D\u00e9monstration interne valid\u00e9e (DSI, professeur, \u00e9l\u00e8ves, section GLIA) \u2014 PoC techniquement abouti, sans suite d\u00e9cisionnelle OPT\n\n*Type : professional*\n\n**Tags :** [civic-tech](../tags/civic-tech.md), [frugal](../tags/frugal.md), [iot](../tags/iot.md), [mentor](../tags/mentor.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [opt-nc](../tags/opt-nc.md), [pacifique](../tags/pacifique.md), [pedagogy](../tags/pedagogy.md)", "projects/catalogue-d-apis-publiques-opt-nc-vitrine-produit-d-appel": "Conception et pilotage d'un catalogue d'APIs publiques gratuites expos\u00e9es sur le portail APIGEE de l'OPT-NC (https://apigee-optnc-prd-api.apigee.io/). Toutes en lecture seule. Sources h\u00e9t\u00e9rog\u00e8nes selon l'API : donn\u00e9es statiques g\u00e9r\u00e9es en interne, scraping de sites sans API officielle, ou croisement avec de l'open data (data.gouv.nc). Strat\u00e9gie vitrine : prouver la valeur de l'interop\u00e9rabilit\u00e9, attirer d\u00e9veloppeurs et entreprises, cr\u00e9er l'app\u00e9tit pour des APIs suppl\u00e9mentaires ou sur-mesure. R\u00f4le : Product Owner & architecte \u2014 l'\u00e9quipe GLIA d\u00e9veloppe.\n- Localisation des bo\u00eetes postales : g\u00e9olocalisation de toutes les BP en NC \u2014 a donn\u00e9 lieu \u00e0 une r\u00e9utilisation applicative par la communaut\u00e9\n- Suivi de colis : API de tracking OPT-NC expos\u00e9e publiquement \u2014 gen\u00e8se de l'\u00e9cosyst\u00e8me colisnc (SDK Java, webapp, AR, Discord, mobile Flutter)\n- Noms de domaine .NC : scraping du site domaine.nc \u2192 premi\u00e8re et unique API publique sur les domaines .NC \u2014 app mobile Flutter tierce (25 releases, Google Play Store)\n- Pharmacies de garde : scraping \u2192 API exposant les pharmacies d'astreinte en NC \u2014 information critique pour les usagers en dehors des heures ouvr\u00e9es\n- Validateur de num\u00e9ro de t\u00e9l\u00e9phone : validation des num\u00e9ros NC (format, op\u00e9rateur) \u2014 donn\u00e9e interne OPT-NC\n- RIDET : API sur le registre des entreprises actives en NC \u2014 donn\u00e9es data.gouv.nc, 2 articles DEV.to\n- R\u00e9f\u00e9rentiel des agences : localisation et informations de toutes les agences OPT-NC\n- Transitaires : API listant les transitaires habilit\u00e9s \u00e0 g\u00e9rer les taxes de colis de fret en NC \u2014 usage professionnel direct\n\n*Type : professional*\n\n**Tags :** [api-fication](../tags/api-fication.md), [architecture](../tags/architecture.md), [devrel](../tags/devrel.md), [interoperability](../tags/interoperability.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [pacifique](../tags/pacifique.md), [team-lead](../tags/team-lead.md)", "projects/colisnc-ecosysteme-open-source-suivi-de-colis-opt-nc": "\u00c9cosyst\u00e8me complet de 6 composants open source construits autour du suivi de colis de l'OPT-NC : SDK Java distribu\u00e9 sur JitPack avec CI Travis, webapp responsive d\u00e9ploy\u00e9e en production, assistant en r\u00e9alit\u00e9 augment\u00e9e, borne Angular 11 + Docker, bot Discord Java et prototype mobile Flutter. Illustration concr\u00e8te du potentiel multiplicateur d'une API bien expos\u00e9e.\n- colisnc-sdk : SDK Java publi\u00e9 sur JitPack avec CI Travis \u2014 premi\u00e8re brique permettant aux d\u00e9veloppeurs d'int\u00e9grer le suivi de colis NC sans scraping\n- colisnc-webapp : application web responsive d\u00e9ploy\u00e9e en production sur colisnc.redstone.nc\n- colisnc-AR : assistant en r\u00e9alit\u00e9 augment\u00e9e pour suivre la livraison de ses colis \u2014 pr\u00e9sent\u00e9 dans la communaut\u00e9 OPT-NC\n- colisnc-borne : application borne Angular 11 + Docker pour affichage en agence\n- colisnc-discord : bot Discord Java (Javacord) pour interroger l'API OPT-NC depuis n'importe quel serveur Discord\n- Progression SDK \u2192 webapp \u2192 AR \u2192 borne \u2192 Discord \u2192 mobile (Flutter) : pattern de d\u00e9multiplication autour d'une API expos\u00e9e\n- Impact Docker Hub : colisnc-api \u2014 **132 pulls**\n- **Playlist YouTube Colis NC : 9 vid\u00e9os** \u2014 https://www.youtube.com/playlist?list=PL7GdrgVAWcDjRyCWzfueG9GZqe9M2Lqxe\n\n*Type : open-source*\n\n**Tags :** [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [flutter](../tags/flutter.md), [interoperability](../tags/interoperability.md), [java](../tags/java.md), [mobile](../tags/mobile.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [saga](../tags/saga.md)", "projects/duckdb-brew-extension-duckdb-community": "Extension officielle DuckDB Community permettant de requ\u00eater les packages Homebrew install\u00e9s directement en SQL. Construite pendant le GitHub Copilot CLI Challenge avec vibe coding + CI/CD. List\u00e9e sur duckdb.org. Demo Quarto publi\u00e9e en 2026 : notebook PDF avec Graph Data Science et charts de s\u00e9curit\u00e9.\n- List\u00e9e officiellement sur duckdb.org/community_extensions/extensions/brew\n- Construite en hackathon, activement maintenue \u2014 824 t\u00e9l\u00e9chargements/mois\n- Permet analyses de d\u00e9pendances, centralit\u00e9 de graphe et rapports de s\u00e9curit\u00e9 en SQL pur\n- Demo Quarto : notebook Python g\u00e9n\u00e8re un rapport PDF professionnel via GitHub Copilot en 2h\n\n*Type : open-source*\n\n**Tags :** [data](../tags/data.md), [duckdb](../tags/duckdb.md), [international](../tags/international.md), [maintainer](../tags/maintainer.md), [open-source](../tags/open-source.md), [packaging](../tags/packaging.md), [saga](../tags/saga.md)", "projects/edb-noumea-sdk-qualite-eaux-de-baignade": "Package PyPI (stack uv) scraper de la qualit\u00e9 des eaux de baignade \u00e0 Noum\u00e9a. \u00c9cosyst\u00e8me complet : TUI Go/BubbleTea, dataset Kaggle, live CSV data, graphiques automatiques. v0.4.0 mai 2026.\n- Activement maintenu \u2014 v0.4.0 mai 2026\n- HuggingFace MCP Space : rastadidi/edb-noumea \u2014 serveur MCP pour acc\u00e8s direct aux donn\u00e9es de qualit\u00e9 des eaux depuis les agents IA\n- \u00c9cosyst\u00e8me complet : PyPI + Kaggle + GitHub Actions + TUI Go\n- Exemple de data citizen appliqu\u00e9 au quotidien\n- Gen\u00e8se document\u00e9e dans une s\u00e9rie LinkedIn Pulse 2019 : API REST \u2192 SVG badges \u2192 Twitter bot \u2192 AR \u2192 smart city (5 articles)\n\n*Type : open-source*\n\n**Tags :** [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [go](../tags/go.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [python](../tags/python.md), [scraping](../tags/scraping.md)", "projects/enseignement-miage-unc-module-interoperabilite-si": "Conception et animation du module Interop\u00e9rabilit\u00e9 des SI en Master MIAGE, IAE-UNC, sur temps personnel. P\u00e9dagogie Montessori appliqu\u00e9e \u00e0 l'universit\u00e9 : learning by doing, projets open source r\u00e9els, syllabus public sur GitHub. 12 \u00e9tudiants, promo 2025. Renouvel\u00e9 pour une 2\u00e8me session, ao\u00fbt \u2192 d\u00e9cembre 2026.\n- P\u00e9dagogie double ancrage : Montessori (manipulation, autonomie) + Mindful Learning d'Ellen Langer \u2014 chaque \u00e9tudiant repart avec du code en prod\n- D\u00e9vi Berg\u00e8s (M2 2025) : t\u00e9moignage vid\u00e9o spontan\u00e9 sur la m\u00e9thode + recrut\u00e9 \u00e0 l'OPT-NC sur recommandation active \u2014 https://youtu.be/0QU79d9cqJg\n- Thouraya Sakis (M2 2025) : retenue \u00e0 l'ISEE-NC apr\u00e8s recommandation avec entretien\n- Deux placements en institution publique cal\u00e9donienne en juin 2026 \u2014 preuve d'impact au-del\u00e0 du cours\n- Expo des r\u00e9alisations \u00e9tudiantes en fin d'ann\u00e9e document\u00e9e sur Dev.to (23 commentaires)\n- Syllabus public sur GitHub \u2014 transparence totale de la m\u00e9thode\n- Renouvel\u00e9 par l'IAE-UNC pour une 2\u00e8me session (ao\u00fbt \u2192 d\u00e9cembre 2026)\n\n*Type : professional*\n\n**Tags :** [interoperability](../tags/interoperability.md), [mentorat](../tags/mentorat.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [pedagogy](../tags/pedagogy.md), [transmission](../tags/transmission.md), [unc-partnership](../tags/unc-partnership.md)", "projects/generative-art-temps-d-attente-agences-opt-nc": "\u00c9cosyst\u00e8me complet autour des temps d'attente en agence OPT-NC : API REST conteneuris\u00e9e (opt-temps-attente-agences-api), front-end generative art data-driven (p5.js, Docker), exp\u00e9rience Unity interactive, dashboard Streamlit historique et LED Matrix IoT. Document\u00e9 dans une s\u00e9rie de 7 articles Dev.to (@adriens + @optnc) de juin 2022 \u00e0 d\u00e9cembre 2024.\n- opt-temps-attente-agences-api : API REST conteneuris\u00e9e \u2014 **102 pulls** Docker Hub\n- web-generative-art-temps-attente-opt : front-end p5.js generative art data-driven \u2014 **278 pulls** Docker Hub\n- Stack cr\u00e9ative : p5.js (simulations orbitales, balles, gravit\u00e9) + Unity (exp\u00e9rience interactive)\n- API publi\u00e9e sur RapidAPI marketplace (2022) \u2014 exposition internationale\n- Dashboard Streamlit historique via Apigee Developer Portal (2024)\n- S\u00e9rie Dev.to 7 articles (juin 2022 \u2192 d\u00e9c. 2024) : https://dev.to/adriens/series/18414\n- **20 vid\u00e9os playlist Temps d'attente en agences** \u2014 https://www.youtube.com/playlist?list=PL7GdrgVAWcDgN1QV5tbPRCa1f5Q83yRMi\n- M\u00eame source de donn\u00e9es r\u00e9utilis\u00e9e dans le LED Matrix IoT Hackster.io (2024) et projets tutor\u00e9s UNC\n\n*Type : professional*\n\n**Tags :** [api-fication](../tags/api-fication.md), [data](../tags/data.md), [devrel](../tags/devrel.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [opt-nc](../tags/opt-nc.md), [pacifique](../tags/pacifique.md), [saga](../tags/saga.md)", "projects/geol-cli-de-gestion-des-end-of-life": "Outil open source (Go) pour g\u00e9rer les end-of-life des composants logiciels en terminal et CI. Int\u00e8gre Trivy pour le scan de vuln\u00e9rabilit\u00e9s. Reporting Quarto int\u00e9gr\u00e9 : rapport HTML avec charts visuels (score de dette, calendrier EOL) \u2014 instantan\u00e9, partageable \u00e0 des d\u00e9cideurs non-techniques. Con\u00e7u le week-end sur temps personnel. Hacktoberfest Maintainer Spotlight 2025.\n- 1 300+ downloads, 11 stars, v2.7.1 activement maintenue\n- Hacktoberfest 2025 Maintainer Spotlight officiel\n- Rapport HTML Quarto : score de dette technique, charts visuels et calendrier EOL \u2014 g\u00e9n\u00e9r\u00e9 automatiquement, partageable directement \u00e0 des d\u00e9cideurs\n- Approche marketing $0 \u2014 d\u00e9mos vid\u00e9o sur Mux/YouTube et articles dev.to uniquement, z\u00e9ro budget pub\n\n*Type : open-source*\n\n**Tags :** [devsecops](../tags/devsecops.md), [duckdb](../tags/duckdb.md), [frugal](../tags/frugal.md), [go](../tags/go.md), [international](../tags/international.md), [maintainer](../tags/maintainer.md), [open-source](../tags/open-source.md), [saga](../tags/saga.md)", "projects/helia-etat-reseaux-sdk-cartographie-des-maintenances-reseau-opt-nc": "SDK Python open source helia-etat-reseaux (PyPI, LGPL-3.0) pour scraper les maintenances programm\u00e9es r\u00e9seau OPT-NC/HELIA (helia.nc/etat-du-reseau). Enrichissement avec les r\u00e9f\u00e9rentiels open data NC : communes (datavenc), provinces et population l\u00e9gale. D\u00e9p\u00f4t de donn\u00e9es GitHub accumule les interventions actives et archiv\u00e9es. Application web Astro d\u00e9ploy\u00e9e sur GitHub Pages : carte interactive g\u00e9olocalis\u00e9e (bulles proportionnelles \u00e0 la population impact\u00e9e), vue Kanban des maintenances imminentes, analytics, flux RSS et abonnement calendrier par commune. \"Tour des maintenances\" : animation spectacle data-art des interventions OPT-NC sur fond cartographique. Lien explicite avec la m\u00e9thode 5S data-driven.\n- SDK helia-etat-reseaux (PyPI v0.6.1, LGPL-3.0) \u2014 scraping + enrichissement r\u00e9f\u00e9rentiels communes/provinces/population \u2014 https://github.com/adriens/helia-etat-reseau\n- Data repo GitHub : accumulation maintenances actives et archiv\u00e9es \u2014 https://github.com/adriens/helia-etat-reseau-data\n- Carte interactive g\u00e9olocalis\u00e9e : interventions OPT-NC avec bulles proportionnelles \u00e0 la population impact\u00e9e par commune\n- Vue Kanban : maintenances imminentes avec dur\u00e9e, type d'impact et population concern\u00e9e\n- RSS par commune + export calendrier (.ics) : alertes proactives avant coupure planifi\u00e9e\n- \"Tour des maintenances\" : animation data-art spectacle des interventions sur carte \u2014 https://youtu.be/P0Q0DY8sCn0\n- R\u00e9trospective saga temps d'attente OPT-NC : visualisations reprises dans le plan strat\u00e9gique, Unity 3D et matrices LED\n\n*Type : open-source*\n\n**Tags :** [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [devrel](../tags/devrel.md), [geomatique](../tags/geomatique.md), [interoperability](../tags/interoperability.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [open-source](../tags/open-source.md), [opt-nc](../tags/opt-nc.md), [pacifique](../tags/pacifique.md), [packaging](../tags/packaging.md), [python](../tags/python.md), [saga](../tags/saga.md), [scraping](../tags/scraping.md)", "projects/helia-monitor-stack-monitoring-consommation-mobile-opt-nc": "Stack personnelle de monitoring de l'offre mobile Helia (OPT-NC) : APK reverse-engineered pour extraire les appels HTTP priv\u00e9s, Go CLI qui snapshote voice/data/SMS dans DuckDB toutes les 5 minutes, widgets KDE Plasma Python/PyQt live. Hermes Agent g\u00e9n\u00e8re un rapport PDF 17 pages multi-parties prenantes (CEO/CIO/Admin r\u00e9seau) via LaTeX pour $19.57 vs une semaine de travail manuel. Inscrit au DEV Challenge (Dev.to). Repo : https://github.com/adriens/helia\n- Reverse-engineering de l'APK Helia \u2014 extraction des appels HTTP priv\u00e9s, reconstruits en Go CLI\n- DuckDB comme base locale : historique de consommation, burn rate, alertes \u2014 donn\u00e9es non disponibles dans l'app officielle\n- Widgets KDE Plasma Python/PyQt lisant DuckDB en temps r\u00e9el avec ic\u00f4ne system tray\n- Rapport PDF 17 pages g\u00e9n\u00e9r\u00e9 par Hermes Agent + LaTeX : 3 profils (CEO/CIO/Admin), 326 requ\u00eates, 61.4M tokens, $19.57\n- Int\u00e9gration robot Reachy Mini (simulation, CPU-only, sans LLM) : alerte vocale sur seuil de consommation via HuggingFace app store \u2014 https://youtu.be/hnn5J3qbDyU\n- \u00c9tude compl\u00e8te open innovation (65 min) \u2014 t\u00e9l\u00e9m\u00e9trie, \u00e9ditiques, SLAs, DORA, B2B APIGEE, MCP, IoT \u2014 https://youtu.be/tPihPZRfh2A\n- Dev Challenge HERMES x Qwen 3.7 Max (OpenRouter) : rapport Quarto multi-r\u00f4les (CEO/CIO/Admin/Dev), role-playing simulation, bimodal distribution discovery \u2014 https://youtu.be/Zw-lfNFA0fQ\n- Clip : HERMES annotant les SLAs analytics LaTeX en direct depuis DuckDB \u2014 https://youtu.be/wUKko5sRwzQ\n- Clip role-playing d\u00e9di\u00e9 : personas lean/agile (CEO, CIO, CTO, sysadmin, dev, marketing, client final) jou\u00e9s par HERMES pour g\u00e9n\u00e9rer un executive summary one-pager \u2014 https://youtu.be/RxqDZKXxWyY\n- Manifeste Open Innovation NC (< 1') \u2014 appel \u00e0 l'innovation collective pour tous les devs, makers et startups cal\u00e9doniennes \u2014 https://youtu.be/krLwHwx1AeY\n\n*Type : open-source*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [devrel](../tags/devrel.md), [duckdb](../tags/duckdb.md), [frugal](../tags/frugal.md), [go](../tags/go.md), [huggingface](../tags/huggingface.md), [interoperability](../tags/interoperability.md), [iot](../tags/iot.md), [mcp](../tags/mcp.md), [mobile](../tags/mobile.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [opt-nc](../tags/opt-nc.md), [pacifique](../tags/pacifique.md), [python](../tags/python.md), [saga](../tags/saga.md)", "projects/knowledge-graph-si-opt-nc-neo4j": "Syst\u00e8me de cartographie du SI de l'OPT-NC bas\u00e9 sur Neo4j avec release automatis\u00e9e via GitHub Actions. Pr\u00e9sent\u00e9 \u00e0 NODES 2022, 2023 et 2024. Enrichi d'agents IA.\n- Speaker NODES 2022 : Cartographie du SI OPT-NC \u2014 premi\u00e8re version du knowledge graph\n- Speaker NODES 2023 : Discover a Country's UN SDGs Concerns w/ Open Metadata on Neo4j\n- Speaker NODES 2024 : Cloud-Native Knowledge Graph Automation & AI Agents\n- Release automatis\u00e9e via GitHub Actions\n- endoflife.date-neo4j r\u00e9f\u00e9renc\u00e9 dans le wiki officiel endoflife.date aux c\u00f4t\u00e9s de Dynatrace et Shodan\n\n*Type : professional*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [architecture](../tags/architecture.md), [data](../tags/data.md), [knowledge-graph](../tags/knowledge-graph.md), [neo4j](../tags/neo4j.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [pacifique](../tags/pacifique.md), [speaker](../tags/speaker.md), [team-lead](../tags/team-lead.md)", "projects/legacy-mailbox-sms-notifier-proto-boite-aux-lettres-connectee": "Prototype personnel transformant une bo\u00eete aux lettres classique en objet connect\u00e9 envoyant un SMS \u00e0 chaque arriv\u00e9e de courrier sans modification m\u00e9canique. Stack Arduino MKR1000 + Arduino IoT Cloud + IFTTT \u2014 point de d\u00e9part du Mailbox Notifier OPT-NC.\n- Concept 'high-low tech' : hack de bo\u00eete standard, aucune modification m\u00e9canique requise\n- Stack : Arduino MKR1000 + capteur ultrason HC-SR04 + Arduino IoT Cloud + IFTTT\n- 4 600+ vues sur Hackster.io \u2014 gen\u00e8se directe du projet professionnel OPT-NC (2020)\n\n*Type : open-source*\n\n**Tags :** [iot](../tags/iot.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md)", "projects/liquibase-package-chocolatey": "Cr\u00e9ation du package Chocolatey officiel pour Liquibase, l'outil de migration de bases de donn\u00e9es de r\u00e9f\u00e9rence. Package ensuite repris et maintenu par les ing\u00e9nieurs DevOps de Liquibase eux-m\u00eames \u2014 validation directe par l'\u00e9diteur de la qualit\u00e9 du travail.\n- 37 250 downloads sur la communaut\u00e9 Chocolatey\n- Repris par les ing\u00e9nieurs DevOps de Liquibase \u2014 adoption officielle par l'\u00e9diteur\n- Premi\u00e8re version publi\u00e9e le 10 mai 2013 (Liquibase 2.0.5.1)\n\n*Type : open-source*\n\n**Tags :** [data](../tags/data.md), [devsecops](../tags/devsecops.md), [international](../tags/international.md), [maintainer](../tags/maintainer.md), [open-source](../tags/open-source.md)", "projects/mailbox-notifier-boite-aux-lettres-connectee-opt-nc": "Dispositif IoT co-con\u00e7u avec l'\u00e9quipe OPT-NC (compte boiteconnecteeopt) d\u00e9tectant l'arriv\u00e9e du courrier par capteur ultrason et envoyant des notifications WiFi via IFTTT. Tutorat industriel d'un \u00e9tudiant (Math\u00e9o Moinet) sur ce projet hardware.\n- Co-auteur avec boiteconnecteeopt (OPT-NC) et Math\u00e9o Moinet \u2014 projet encadr\u00e9 en tutorat\n- Stack : NodeMCU ESP-12E + HC-SR04 + Arduino IDE + IFTTT Maker service\n- 5 400+ vues sur Hackster.io \u2014 niveau Interm\u00e9diaire, rayonnement communaut\u00e9 maker mondiale\n\n*Type : professional*\n\n**Tags :** [iot](../tags/iot.md), [mentor](../tags/mentor.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [opt-nc](../tags/opt-nc.md), [pacifique](../tags/pacifique.md), [pedagogy](../tags/pedagogy.md)", "projects/mcp-opt-nc-offres-d-emploi-hugging-face": "Model Context Protocol exposant les offres d'emploi de l'OPT-NC depuis Hugging Face. D\u00e9mo publique : trouver et candidater \u00e0 un poste avec Claude en 20 minutes.\n- D\u00e9mo YouTube : candidature compl\u00e8te (lettre, pr\u00e9paration entretien) en 20 minutes\n- Stack 100% open source et open data\n- Gradio + Hugging Face Spaces + Claude\n\n*Type : professional*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [devrel](../tags/devrel.md), [huggingface](../tags/huggingface.md), [mcp](../tags/mcp.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md)", "projects/mobitag-cli-go-pour-l-envoi-de-sms": "CLI en Go pour envoyer des SMS via l'API Mobitag de l'OPT-NC. Distribu\u00e9 via Homebrew et goreleaser. Con\u00e7u avec l'\u00e9quipe comme exercice p\u00e9dagogique CLI-first. S\u00e9rie de 4 articles sur dev.to.\n- Comment\u00e9 par Jess Lee, co-fondatrice de DEV/Forem\n- Philosophie CLI-guidelines : UX first, binaire statique cross-platform, Cobra\n- Distribu\u00e9 via Homebrew/goreleaser\n- Custom connector Power Automate d\u00e9velopp\u00e9 pour appeler l'API Mobitag expos\u00e9e sur APIGEE \u2014 rend l'envoi de SMS possible depuis n'importe quel workflow, gratuitement pour l'OPT-NC, et d\u00e9montre la valeur bankable de ce type de composant\n\n*Type : open-source*\n\n**Tags :** [api-fication](../tags/api-fication.md), [go](../tags/go.md), [interoperability](../tags/interoperability.md), [mentor](../tags/mentor.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [team-lead](../tags/team-lead.md)", "projects/odata-ncl-open-data-citoyenne-nouvelle-caledonie": "Umbrella de projets data citoyenne sur les donn\u00e9es ouvertes de Nouvelle-Cal\u00e9donie. Objectif : collecter, analyser et publier des donn\u00e9es locales \u00e0 fort impact soci\u00e9tal \u2014 s\u00e9curit\u00e9 maritime, qualit\u00e9 des eaux, s\u00e9curit\u00e9 routi\u00e8re. Stack compl\u00e8te : Python/uv, Quarto, Kaggle, GitHub Actions, TUI Go/BubbleTea.\n- Attaques de requins NC : dataset Kaggle, 3 notebooks d'analyse, rapport PDF Quarto, article Dev.to avec Gemini CLI\n- Eaux de baignade Noum\u00e9a (edb-noumea) : PyPI v0.4.0, TUI Go, live CSV, graphiques automatiques\n- Pattern reproductible : open data \u2192 scraping \u2192 dataset Kaggle \u2192 notebooks \u2192 rapport Quarto\n- R\u00e9utilisations publi\u00e9es sur data.gouv.nc, portail open data officiel de Nouvelle-Cal\u00e9donie\n\n*Type : open-source*\n\n**Tags :** [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [go](../tags/go.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [python](../tags/python.md), [scraping](../tags/scraping.md)", "projects/ollama-models-dataset-stats-telechargements-llm": "Dataset Kaggle exposant les statistiques de t\u00e9l\u00e9chargement des mod\u00e8les Ollama : donn\u00e9es collect\u00e9es, stock\u00e9es dans une base DuckDB, export\u00e9es en Parquet. Notebook d'exploration fourni. Croise data engineering frugal et veille sur l'\u00e9cosyst\u00e8me LLM open source.\n- Stack DuckDB + Parquet \u2014 pipeline analytique l\u00e9ger et reproductible\n- Notebook Kaggle int\u00e9gr\u00e9 pour l'exploration imm\u00e9diate des donn\u00e9es\n- Indicateur de tendance sur l'adoption des LLM open source via Ollama\n\n*Type : open-source*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [data](../tags/data.md), [duckdb](../tags/duckdb.md), [frugal](../tags/frugal.md), [international](../tags/international.md), [open-data](../tags/open-data.md), [open-source](../tags/open-source.md)", "projects/open-data-rh-opt-nc-experience-candidat-augmentee-par-l-ia": "Programme open data autour des donn\u00e9es RH de l'OPT-NC : r\u00e9f\u00e9rentiel des m\u00e9tiers, offres d'emploi, AVPS (avis de vacances de poste) et organigramme publi\u00e9s en open data pour cr\u00e9er une exp\u00e9rience candidat unique. Datasets Hugging Face, agents IA et MCPs pour rendre ces donn\u00e9es exploitables par Claude et d'autres LLMs.\n- R\u00e9f\u00e9rentiel des m\u00e9tiers OPT-NC : dataset HuggingFace + application Gradio\n- AVPS (avis de vacances de poste) : dataset HuggingFace + agent IA de matching comp\u00e9tences/poste\n- Objectif : exp\u00e9rience candidat d'excellence \u2014 trouver, comprendre et candidater \u00e0 un poste en quelques minutes via IA\n\n*Type : professional*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [huggingface](../tags/huggingface.md), [mcp](../tags/mcp.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [pacifique](../tags/pacifique.md), [team-lead](../tags/team-lead.md)", "projects/opt-nc-fiber-eligibility-scraper-go-api-rest-swagger": "Scraper Go (Chromium headless) exposant l'\u00e9ligibilit\u00e9 fibre et ADSL de l'OPT-NC sous forme d'API REST avec documentation Swagger/OpenAPI 3.0 interactive. Architecture clean (cmd/internal/pkg), dual mode CLI + API, image Docker Hub publique, Taskfile. Fait sur temps personnel \u2014 data citizen.\n- Scraping Chromium headless en Go \u2014 approche plus robuste que HtmlUnit Java (2017), g\u00e8re le JavaScript des formulaires OPT-NC\n- API REST s\u00e9mantique : 200 (num\u00e9ro trouv\u00e9), 404 (inconnu), 400 (format invalide) \u2014 retourne fibre, ADSL, liste des FAIs NC disponibles\n- Swagger UI embarqu\u00e9 (OpenAPI 3.0) : documentation interactive g\u00e9n\u00e9r\u00e9e depuis annotations Go\n- **439 pulls** Docker Hub \u2014 image publique rastadidi/optnc-fiber-eligibility + Taskfile pour build/run/test/logs\n\n*Type : open-source*\n\n**Tags :** [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [go](../tags/go.md), [interoperability](../tags/interoperability.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [scraping](../tags/scraping.md)", "projects/oracle-jutils-framework-pl-sql-oracle-11g": "Framework open source de packages PL/SQL pour Oracle 11g (dump LOB, CRC, MIME type, XMPP, QR codes, Twitter...). Premi\u00e8re et unique impl\u00e9mentation libre. D\u00e9couvert et reconnu par des \u00e9quipes Oracle APEX au Texas.\n- 6 509 t\u00e9l\u00e9chargements sur SourceForge (2009-2026)\n- Note 5/5 \u00e9toiles par la communaut\u00e9\n- Reconnu par des \u00e9quipes Oracle APEX bas\u00e9es au Texas\n\n*Type : open-source*\n\n**Tags :** [data](../tags/data.md), [international](../tags/international.md), [java](../tags/java.md), [open-source](../tags/open-source.md)", "projects/person-counter-comptage-ml-pour-optimiser-l-occupation-des-salles-de-reunion": "API Java de d\u00e9tection et comptage d'entit\u00e9s par vision par ordinateur, bas\u00e9e sur DJL (Deep Java Library) et TensorFlow. Alimentait un dashboard ELK Stack en KPIs temps r\u00e9el et heatmaps pour optimiser l'occupation des salles de r\u00e9union \u00e0 l'OPT-NC. Distribu\u00e9e en image Docker sur DockerHub. Document\u00e9e dans un article LinkedIn Pulse.\n- DJL + TensorFlow : inf\u00e9rence ML en Java sans d\u00e9pendance Python \u2014 int\u00e9gration native Spring Boot, image Docker publique sur DockerHub\n- Dashboard Kibana temps r\u00e9el : KPIs d'occupation + heatmaps issues des flux API \u2014 aide \u00e0 la d\u00e9cision sur la gestion des espaces de travail\n- API REST avec filtres par classe d'objet et seuil de confiance, endpoints de visualisation, m\u00e9tadonn\u00e9es et analyse\n- Article LinkedIn Pulse publi\u00e9 : d\u00e9monstration de la valeur m\u00e9tier du ML appliqu\u00e9 \u00e0 l'optimisation des espaces\n- API conteneuris\u00e9e (person-counter-api) : **91 pulls** Docker Hub\n- Syst\u00e8me d'alerte from scratch sur Raspberry Pi 4 + cam\u00e9ra : d\u00e9tection temps r\u00e9el + appels webhooks \u2014 impl\u00e9ment\u00e9 avec un stagiaire (Guillaume Bertherat, 2021)\n\n*Type : professional*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [architecture](../tags/architecture.md), [java](../tags/java.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md)", "projects/post-office-wait-time-led-matrix-affichage-temps-d-attente-iot-opt-nc": "Matrice LED anim\u00e9e (Pimoroni Cosmic Unicorn / Raspberry Pi Pico W) affichant en temps r\u00e9el les temps d'attente en agence OPT-NC, pilot\u00e9e par l'API publique OPT-NC via Google Apigee. Preuve de concept IoT m\u00ealant donn\u00e9es publiques et exp\u00e9rience client physique.\n- Int\u00e9gration directe de l'API temps d'attente OPT-NC Developer Portal dans un objet physique\n- Hardware : Pimoroni Cosmic Unicorn (Raspberry Pi Pico W) \u2014 affichage LED matrix anim\u00e9\n- Publi\u00e9 sur Hackster.io \u2014 niveau Beginner, 192 vues\n\n*Type : professional*\n\n**Tags :** [api-fication](../tags/api-fication.md), [iot](../tags/iot.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [opt-nc](../tags/opt-nc.md), [pacifique](../tags/pacifique.md)", "projects/programme-stages-projets-tutores-opt-nc-unc": "Programme informel mais document\u00e9 d'encadrement de stagiaires et projets tutor\u00e9s en partenariat avec l'Universit\u00e9 de la Nouvelle-Cal\u00e9donie (UNC). Chaque projet part d'un probl\u00e8me r\u00e9el OPT-NC, expose un \u00e9tudiant \u00e0 des technologies modernes, et livre un artefact concret et publi\u00e9 \u2014 article Dev.to, vid\u00e9o YouTube, repo GitHub. Technologies couvertes : ML/IA, Flutter, Unity, Streamlit, Next.js, ELK Stack, IoT/LED matrix, Java/JavaFX, APIs REST conteneuris\u00e9es.\n- 14 projets encadr\u00e9s (2019\u21922026) \u2014 9 stages + 5 projets tutor\u00e9s\n- 18 \u00e9tudiants distincts \u2014 majoritairement locaux (Noum\u00e9a), avec des \u00e9tudiants de France m\u00e9tropolitaine en \u00e9change \u00e0 l'UNC (Toulouse, Paris, Toulon)\n- 100% des projets livr\u00e9s avec au moins un artefact public : article Dev.to, vid\u00e9o YouTube ou repo GitHub open source\n- Fil conducteur : un probl\u00e8me r\u00e9el OPT-NC \u2192 open data ou API \u2192 livrable concret \u2192 publication \u2014 reproductible sur 6 ans\n\n*Type : professional*\n\n**Tags :** [api-fication](../tags/api-fication.md), [civic-tech](../tags/civic-tech.md), [mentorat](../tags/mentorat.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [open-source](../tags/open-source.md), [opt-nc](../tags/opt-nc.md), [pacifique](../tags/pacifique.md), [pedagogy](../tags/pedagogy.md), [transmission](../tags/transmission.md), [unc-partnership](../tags/unc-partnership.md)", "projects/resume-to-pokemon-cv-en-donnees-pokeapi-embeddings": "Prototype d'automatisation autour du CV-en-donn\u00e9es : mettre en interop\u00e9rabilit\u00e9 le resume.json (JSON Resume, livr\u00e9 en continu sur registry.jsonresume.org/adriens) avec la Pok\u00e9API v2 pour d\u00e9couvrir \u00ab quel Pok\u00e9mon on est \u00bb et pourquoi. 100% open source, on-premise, sans GPU (Core i5, 8 Gio). R\u00e9alis\u00e9 pour le DEV.to Weekend Challenge (Passion edition, juillet 2026) \u2014 l'innovation frugale qui relie art, data et fun.\n- HuggingFace Space `rastadidi/resume-to-pokemon` (Gradio + serveur MCP) \u2014 pur open source, aucune d\u00e9pendance GPU\n- Pipeline : dataset Pok\u00e9API construit une fois (types, stats, profil-arch\u00e9type m\u00e9tier d\u00e9riv\u00e9) \u2192 embeddings `BAAI/bge-m3` \u2192 reranking cross-encoder `BAAI/bge-reranker-v2-m3` \u2192 cartes de matching partageables avec explication du score et confiance calibr\u00e9e (z-score sur la shortlist)\n- Interop\u00e9rabilit\u00e9 : le CV JSON Resume publi\u00e9 en continu sur le registry sert de source d'entr\u00e9e directe \u2014 d\u00e9monstration concr\u00e8te de la valeur d'un CV en donn\u00e9es structur\u00e9es\n- Soumission DEV.to Weekend Challenge : https://dev.to/adriens/find-the-pokemon-you-are-w-pokeapi-your-resume-embeddings-3bb5 + d\u00e9mo vid\u00e9o : https://youtu.be/P1IEkb5g07I\n\n*Type : open-source*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [api-fication](../tags/api-fication.md), [data](../tags/data.md), [devrel](../tags/devrel.md), [embeddings](../tags/embeddings.md), [frugal](../tags/frugal.md), [huggingface](../tags/huggingface.md), [interoperability](../tags/interoperability.md), [mcp](../tags/mcp.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md)", "projects/rfc4180-validator-validateur-csv-strict-pour-ci-cd": "Image Docker validant strictement la conformit\u00e9 d'un fichier CSV \u00e0 la RFC 4180. Con\u00e7u pour s'int\u00e9grer dans des pipelines CI/CD afin de garantir la qualit\u00e9 des exports CSV avant ingestion ou publication open data.\n- **219 pulls** Docker Hub \u2014 adoption communaut\u00e9 internationale\n- Validation stricte RFC 4180 : s\u00e9parateurs, guillemets, fins de ligne, encodage\n- Int\u00e9gration CI/CD native : retour code 0 (valide) / 1 (non-conforme) exploitable par tout pipeline\n\n*Type : open-source*\n\n**Tags :** [data](../tags/data.md), [devsecops](../tags/devsecops.md), [international](../tags/international.md), [interoperability](../tags/interoperability.md), [open-source](../tags/open-source.md)", "projects/schemacrawler-contribution-open-source": "Contributeur actif sur SchemaCrawler : packaging RPM/DEB, package Chocolatey (23 048 downloads), int\u00e9gration Neo4j.\n- 23 048 downloads du package Chocolatey maintenu\n- Packaging multi-format : Chocolatey, RPM et DEB \u2014 distribution sur les principaux gestionnaires de paquets\n- Int\u00e9gration Neo4j pour visualisation des sch\u00e9mas\n\n*Type : open-source*\n\n**Tags :** [data](../tags/data.md), [international](../tags/international.md), [java](../tags/java.md), [maintainer](../tags/maintainer.md), [open-source](../tags/open-source.md)", "publications/208-articles-techniques-dev-to": "Publication r\u00e9guli\u00e8re d'articles techniques en anglais et fran\u00e7ais sur le data engineering, Neo4j, DevOps, open data, IA et l'interop\u00e9rabilit\u00e9 des SI. 25 badges dont Five Year Club, Hacktoberfest 2025, Google Gemini Challenge, GitHub Copilot Challenge. 1 463 commentaires \u00e9crits.\n\n*\u00c9diteur : Dev.to*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [architecture](../tags/architecture.md), [data](../tags/data.md), [devrel](../tags/devrel.md), [international](../tags/international.md), [open-source](../tags/open-source.md)", "publications/analyse-de-l-historique-netflix-avec-power-bi-linkedin-pulse": "Article explorant l'analyse de son historique de visionnage Netflix (export CSV) : Power Automate pour le traitement des donn\u00e9es, IMDbPY pour l'enrichissement en genres, Power BI pour les visualisations (genres pr\u00e9f\u00e9r\u00e9s, fid\u00e9lit\u00e9 aux s\u00e9ries, sessions intensives). Illustre la valeur des donn\u00e9es personnelles et l'enjeu du RGPD.\n\n*\u00c9diteur : LinkedIn Pulse*\n\n**Tags :** [data](../tags/data.md), [devrel](../tags/devrel.md), [power-platform](../tags/power-platform.md)", "publications/chaine-youtube-devops-lab": "284 vid\u00e9os techniques en fran\u00e7ais et anglais : d\u00e9monstrations live, DevOps, data engineering, Neo4j, MCP, open data. 189 abonn\u00e9s. Inclut des d\u00e9tournements humoristiques de films (VO russe/allemand sous-titr\u00e9s) pour vulgariser des concepts tech.\n\n*\u00c9diteur : YouTube*\n\n**Tags :** [data](../tags/data.md), [devrel](../tags/devrel.md), [devsecops](../tags/devsecops.md), [international](../tags/international.md), [mcp](../tags/mcp.md), [neo4j](../tags/neo4j.md), [open-data](../tags/open-data.md)", "publications/mit-media-lab-creativite-jeux-linkedin-pulse": "R\u00e9flexion sur la cr\u00e9ativit\u00e9, le jeu et le design inspir\u00e9e du MIT Media Lab. \u00c0 partir d'un documentaire Netflix sur l'art abstrait, l'article explore comment les principes du jeu et du design peuvent nourrir la pens\u00e9e cr\u00e9ative et l'innovation en entreprise.\n\n*\u00c9diteur : LinkedIn Pulse*\n\n**Tags :** [devrel](../tags/devrel.md), [innovation](../tags/innovation.md), [pedagogy](../tags/pedagogy.md)", "publications/open-data-opt-nc-sur-kaggle-et-hugging-face": "Animation des organisations OPT-NC sur Kaggle (kaggle.com/optnouvellecaldonie) et Hugging Face (huggingface.co/opt-nc) : datasets open data, notebooks, applications Gradio et MCPs. 27 datasets publi\u00e9s, 81 notebooks de d\u00e9monstration. SDKs Python de scraping publi\u00e9s sur PyPI (edb-noumea, auptitcafe, aquavena-sdk).\n\n*\u00c9diteur : Kaggle / Hugging Face*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [data](../tags/data.md), [devrel](../tags/devrel.md), [huggingface](../tags/huggingface.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [pacifique](../tags/pacifique.md), [python](../tags/python.md)", "publications/paroles-d-agent-adrien-sales-opt-nc": "\u00c9pisode de la s\u00e9rie interne 'Paroles d'agent' publi\u00e9e sur la cha\u00eene YouTube officielle de l'OPT-NC. Pr\u00e9sente son r\u00f4le d'int\u00e9grateur de donn\u00e9es \u00e0 la DSI, sa vision de la collaboration m\u00e9tier/IT, son meilleur succ\u00e8s (d\u00e9bloquer l'adoption d'un logiciel en travaillant main dans la main avec les m\u00e9tiers) et sa devise : 'No excuse'.\n\n*\u00c9diteur : YouTube / OPT-NC*\n\n**Tags :** [devrel](../tags/devrel.md), [interview](../tags/interview.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [pacifique](../tags/pacifique.md)", "publications/postgresql-security-analysis-zenodo": "Premi\u00e8re publication scientifique sur Zenodo (DOI : 10.5281/zenodo.20467660). Analyse de s\u00e9curit\u00e9 des versions PostgreSQL via trois outils CLI : geol (End-of-Life), Trivy (scan de vuln\u00e9rabilit\u00e9s Docker), skopeo (inspection d'images). D\u00e9montre comment combiner IA g\u00e9n\u00e9rative et outils CLI pour automatiser l'analyse de risques sur des images de base de donn\u00e9es.\n\n*\u00c9diteur : Zenodo*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [database](../tags/database.md), [devsecops](../tags/devsecops.md), [geol](../tags/geol.md), [open-source](../tags/open-source.md)", "references/alban-seurat": "J'ai travaill\u00e9 avec Adrien pendant plusieurs ann\u00e9es autour des technologies C++, Java et Oracle sur des produits bancaires innovant et demandant beaucoup d'expertises m\u00e9tier et technique.\n\nAdrien a toujours \u00e9t\u00e9 ouvert et \u00e0 la recherche de compromis entre technologie cutting-edge et maturit\u00e9 n\u00e9cessaire pour l'integration dans un produit. Il a toujours fait preuve de qualit\u00e9 et d'am\u00e9lioration continue dans son travail. Il est aussi un tr\u00e8s bon communiquant et aime partager ses connaissances.\n\nJe recommande chaudement Adrien et j'aimerai pouvoir de nouveau travailler avec lui si l'opportunit\u00e9 se repr\u00e9sente.\n\n*Co-founder & Senior Architect, Kleis Technology S\u00e0rl*\n*Coll\u00e8gue \u2014 m\u00eame \u00e9quipe (Experian Decision Analytics) \u00b7 LinkedIn \u00b7 2018-11-28*\n\n**Tags :** [communication](../tags/communication.md), [continuous-improvement](../tags/continuous-improvement.md), [fintech](../tags/fintech.md), [knowledge-sharing](../tags/knowledge-sharing.md), [peer-recognition](../tags/peer-recognition.md), [pragmatisme-techno](../tags/pragmatisme-techno.md), [technical-expertise](../tags/technical-expertise.md)", "references/bheem-reddy": "It's rare that you come across standout talent like Adrien. I have been working closely with Adrien on SchemaCrawler-lints, I was impressed with all his implementations for the same such as creating Debian packages, Kibana Reporting Dashboards, neo4j and graph Database Integrations so many \ud83d\ude4f\ud83c\udffc He likes to explore lot of technologies in and around from which we can do some cool stuff. Adrien earns my highest recommendation.\n\n*Quality Engineer*\n*Collaborateur open source \u2014 cross-company (projet SchemaCrawler-lints) \u00b7 LinkedIn \u00b7 2019-02-28*\n\n**Tags :** [cross-company](../tags/cross-company.md), [elk-stack](../tags/elk-stack.md), [exploration-techno](../tags/exploration-techno.md), [kibana](../tags/kibana.md), [neo4j](../tags/neo4j.md), [open-source](../tags/open-source.md), [packaging](../tags/packaging.md), [peer-recognition](../tags/peer-recognition.md), [polyvalence](../tags/polyvalence.md), [schemacrawler](../tags/schemacrawler.md)", "references/cedric-pitout": "J'ai eu le plaisir de coop\u00e9rer avec Adrien \u00e0 la DSI de la ville de Noum\u00e9a notamment dans l'interfa\u00e7age de modules SIG avec des applications traditionnelles d\u00e9velopp\u00e9es sous son couvert. Son mot d'ordre est l'interop\u00e9rabilit\u00e9 des syst\u00e8mes avec notamment l'utilisation d'API et de services web de sorte \u00e0 mettre en oeuvre des techniques saines pour le SI.\n\nDe nature curieuse et entreprenante, il cherche toujours \u00e0 comprendre les exigences de chacun, de sorte \u00e0 obtenir rapidement le r\u00e9sultat le plus efficient. Cette d\u00e9marche s'accompagne aussi avec un souci constant de d\u00e9velopper de la valeur et de la performance sur le code produit.\n\n*Chef de projet g\u00e9omatique & informatique, administrateur SIG, manager d'\u00e9quipe*\n*Coll\u00e8gue \u2014 m\u00eame \u00e9quipe (DSI Ville de Noum\u00e9a) \u00b7 LinkedIn \u00b7 2018-10-17*\n\n**Tags :** [api-design](../tags/api-design.md), [code-quality](../tags/code-quality.md), [comprehension-besoins](../tags/comprehension-besoins.md), [curiosite](../tags/curiosite.md), [dsi-noumea](../tags/dsi-noumea.md), [geomatique](../tags/geomatique.md), [interoperability](../tags/interoperability.md), [peer-recognition](../tags/peer-recognition.md), [performance](../tags/performance.md), [services-web](../tags/services-web.md), [sig](../tags/sig.md)", "references/clementine-galin-2": "J'ai eu la chance d'avoir Adrien comme intervenant en Master MIAGE, dans une UE intitul\u00e9e Interop\u00e9rabilit\u00e9 des SI. Un intitul\u00e9 qui peut sembler technique au d\u00e9part, mais qu'il a su rendre concret, accessible et vraiment int\u00e9ressant.\n\n\u00c0 travers un projet men\u00e9 en mode \"start-up\", bas\u00e9 sur des donn\u00e9es ouvertes comme celles de prix.nc, Adrien nous a permis de travailler comme de v\u00e9ritables \u00e9quipes en entreprise : data pr\u00e9paration, data visualisation et data science. Chacun pouvait explorer ses propres pistes tout en collaborant avec les autres groupes, ce qui a rendu l'apprentissage tr\u00e8s riche.\n\nCe que je retiens surtout, c'est sa passion, sa p\u00e9dagogie et sa capacit\u00e9 \u00e0 donner du sens \u00e0 des notions parfois complexes. Adrien fait partie de ces enseignants dont on se souvient, car il transmet bien plus qu'un cours : une fa\u00e7on concr\u00e8te d'aborder les projets SI, avec de la curiosit\u00e9, de l'exp\u00e9rimentation et une vraie logique d'apprentissage par la pratique. Je le recommande avec grand plaisir.\n\n*Valoriser la donn\u00e9e, \u00e9clairer la d\u00e9cision*\n*\u00c9tudiante M2 MIAGE UNC \u2014 Adrien intervenant p\u00e9dagogique (UE Interop\u00e9rabilit\u00e9 des SI) \u00b7 LinkedIn \u00b7 2026-05-25*\n\n**Tags :** [civic-tech](../tags/civic-tech.md), [curiosite](../tags/curiosite.md), [data](../tags/data.md), [human-centric](../tags/human-centric.md), [innovation](../tags/innovation.md), [interoperability](../tags/interoperability.md), [lasting-impact](../tags/lasting-impact.md), [open-data](../tags/open-data.md), [pedagogie](../tags/pedagogie.md), [pedagogy](../tags/pedagogy.md), [student-recommendation](../tags/student-recommendation.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [transmission](../tags/transmission.md), [unc-partnership](../tags/unc-partnership.md)", "references/clementine-galin": "Avant-dernier point, l'enrichissement personnel. On a eu la chance de choisir chacun les sujets qu'on souhaitait aborder. Donc \u00e7a c'est vraiment int\u00e9ressant, et d'explorer les pistes qu'on souhaitait explorer. Et dernier point, je remercie Adrien pour ses conseils et ses connaissances qui nous a permis de nous challenger et d'explorer des pistes auxquelles on n'aurait pas pens\u00e9.\n\n*Valoriser la donn\u00e9e, \u00e9clairer la d\u00e9cision*\n*\u00c9tudiante M2 MIAGE UNC \u2014 Adrien intervenant p\u00e9dagogique (UE Interop\u00e9rabilit\u00e9 des SI) \u00b7 YouTube \u00b7 2026-06-04*\n\n**Tags :** [curiosite](../tags/curiosite.md), [human-centric](../tags/human-centric.md), [knowledge-sharing](../tags/knowledge-sharing.md), [lasting-impact](../tags/lasting-impact.md), [mentorat](../tags/mentorat.md), [pedagogie](../tags/pedagogie.md), [pedagogy](../tags/pedagogy.md), [student-recommendation](../tags/student-recommendation.md), [transmission](../tags/transmission.md), [unc-partnership](../tags/unc-partnership.md)", "references/david-brouste": "J'ai eu l'occasion de travailler avec Adrien dans le cadre d'une prestation pour l'OPT, sur la refonte d'une application technique \u00e0 forte volum\u00e9trie, reposant notamment sur Quarkus, Microcks et Kafka.\n\nAdrien a jou\u00e9 un r\u00f4le important dans la r\u00e9ussite du projet. Il a su me transmettre une compr\u00e9hension claire de l'existant, partager les pratiques mises en place dans son service et fournir les orientations n\u00e9cessaires pour avancer rapidement, tout en me laissant une r\u00e9elle autonomie dans la r\u00e9alisation.\n\nJ'ai particuli\u00e8rement appr\u00e9ci\u00e9 sa disponibilit\u00e9, sa r\u00e9activit\u00e9 et la qualit\u00e9 du suivi qu'il assure aupr\u00e8s de son \u00e9quipe. Il sait aussi reconna\u00eetre et valoriser r\u00e9guli\u00e8rement le travail accompli, un aspect essentiel et particuli\u00e8rement motivant. L'organisation du travail est pragmatique et efficace : des \u00e9changes r\u00e9guliers mais timebox\u00e9s, des d\u00e9monstrations hebdomadaires pour suivre concr\u00e8tement les avanc\u00e9es et peu de r\u00e9unions inutiles.\n\nAdrien accorde une grande importance au partage de connaissances. Chaque membre de son \u00e9quipe est encourag\u00e9 \u00e0 pr\u00e9senter les sujets int\u00e9ressants sur lesquels il a travaill\u00e9 afin de faire progresser collectivement le service. Cette culture du partage s'\u00e9tend \u00e9galement au-del\u00e0 de l'\u00e9quipe, notamment par la remont\u00e9e de probl\u00e8mes ou de besoins aupr\u00e8s des communaut\u00e9s open source concern\u00e9es.\n\nTechnophile passionn\u00e9, il poss\u00e8de une connaissance tr\u00e8s large de nombreux domaines. C'est toujours un v\u00e9ritable plaisir d'\u00e9changer avec lui, aussi bien sur des sujets simples que sur des probl\u00e9matiques techniques complexes. Il sait partager sa passion, susciter la curiosit\u00e9 et donner envie d'aller plus loin.\n\nIl sait \u00e9galement se montrer exigeant lorsque cela est n\u00e9cessaire, en veillant au respect des bonnes pratiques, \u00e0 la qualit\u00e9 des r\u00e9alisations et \u00e0 la p\u00e9rennit\u00e9 des choix techniques. Sur ce projet, sa volont\u00e9 \u00e9tait claire : moderniser l'application, r\u00e9duire son co\u00fbt de maintenance et reprendre le contr\u00f4le sur les processus de livraison afin de limiter les d\u00e9pendances externes.\n\nCette collaboration a \u00e9t\u00e9 particuli\u00e8rement enrichissante, aussi bien sur le plan technique que dans la mani\u00e8re d'aborder un projet. Adrien fait partie des personnes avec lesquelles les \u00e9changes font r\u00e9ellement progresser et avec qui j'aurais grand plaisir \u00e0 retravailler.\n\n*Managing Partner, Team Leader & Fullstack Developer at DEVEO.NC | Java \u00b7 Spring Boot \u00b7 Quarkus \u00b7 Angular \u00b7 Mobile \u00b7 CI/CD | Embedded Systems \u00b7 Protocol Reverse Engineering \u00b7 Agentic AI Workflows*\n*Prestataire \u2014 Adrien \u00e9tait son client \u00b7 LinkedIn \u00b7 2026-06-27*\n\n**Tags :** [client-relationship](../tags/client-relationship.md), [community-contribution](../tags/community-contribution.md), [continuous-improvement](../tags/continuous-improvement.md), [curiosite](../tags/curiosite.md), [delivery-focus](../tags/delivery-focus.md), [disponibilite](../tags/disponibilite.md), [kafka](../tags/kafka.md), [knowledge-sharing](../tags/knowledge-sharing.md), [lean](../tags/lean.md), [management-agile](../tags/management-agile.md), [multi-technology](../tags/multi-technology.md), [open-source](../tags/open-source.md), [opt-nc](../tags/opt-nc.md), [quarkus](../tags/quarkus.md), [responsiveness](../tags/responsiveness.md), [team-culture](../tags/team-culture.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [technical-excellence](../tags/technical-excellence.md), [transmission](../tags/transmission.md)", "references/david-kranitz": "Adrien m'a form\u00e9 \u00e0 mes d\u00e9buts \u00e0 la mairie de Noum\u00e9a. D\u00e9j\u00e0 \u00e0 l'\u00e9poque il \u00e9tait pa
