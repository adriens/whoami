ssionn\u00e9 par l'open data et l'open source, et ne n\u00e9gligeait jamais l'int\u00e9grit\u00e9 de notre database. Il est, entre autre, \u00e0 l'origine de la migration technique de la mairie vers SpringBoot.\nNous avons aussi travaill\u00e9 ensemble pour publier des donn\u00e9es de qualit\u00e9 des eaux de baignade de Noum\u00e9a.\nC'est un fervent partisan du DIY et des technologies Arduino.\n\n*D\u00e9veloppeur Java / Kotlin*\n*Direct report d'Adrien \u00b7 LinkedIn \u00b7 2026-05-27*\n\n**Tags :** [architecture-logicielle](../tags/architecture-logicielle.md), [civic-tech](../tags/civic-tech.md), [database](../tags/database.md), [direct-report-recommendation](../tags/direct-report-recommendation.md), [dsi-noumea](../tags/dsi-noumea.md), [iot](../tags/iot.md), [java](../tags/java.md), [mentorat](../tags/mentorat.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [open-source](../tags/open-source.md), [pedagogie](../tags/pedagogie.md), [spring](../tags/spring.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [technical-excellence](../tags/technical-excellence.md), [transmission](../tags/transmission.md)", "references/devi-berges-2": "J'ai eu la chance d'avoir Adrien comme professeur \u00e0 l'UNC en Master 2 MIAGE (cours d'interop\u00e9rabilit\u00e9 des SI), puis comme tuteur acad\u00e9mique pour le programme PEPITE 2025\n\nAdrien est un enseignant qui sort vraiment du lot (dans le top vacataires du MIAGE). Avec lui, on ne se contente pas de faire de la th\u00e9orie. Il nous a fait travailler sur des projets tr\u00e8s concrets (comme avec notre projet prix.nc), en g\u00e9rant la classe comme une v\u00e9ritable start-up. Nous avons m\u00eame eu l'opportunit\u00e9 de pr\u00e9senter nos travaux aux institutions (DAE du gouv et la Station N). Gr\u00e2ce \u00e0 sa p\u00e9dagogie bas\u00e9e sur l'exp\u00e9rimentation et la pratique, il arrive \u00e0 rendre des sujets tr\u00e8s techniques clairs, accessibles et passionnants.\n\nEnsuite, en tant que tuteur pour notre projet d'entrepreneuriat PEPITE, il a \u00e9t\u00e9 un soutien incroyable. Adrien est quelqu'un de tr\u00e8s bienveillant et toujours \u00e0 l'\u00e9coute. Il sait nous faire confiance, nous donner de la libert\u00e9 et nous challenger pour donner le meilleur de nous-m\u00eames, sans jamais nous freiner. En plus, il fait preuve d'une disponibilit\u00e9 sans faille, m\u00eame en dehors des heures de cours et de travail.\n\nC'est un professionnel inspirant qui donne du sens \u00e0 ce qu'il transmet et qui donne envie de s'investir. Je le recommande les yeux ferm\u00e9s \u00e0 toute personne qui recherche un profil \u00e0 la fois tr\u00e8s pointu techniquement avec de formidables qualit\u00e9s humaines.\n\n*Charg\u00e9 de projets / \u00c9tudiant-entrepreneur*\n*\u00c9tudiant M2 MIAGE UNC \u2014 Adrien intervenant p\u00e9dagogique et tuteur PEPITE 2025 \u00b7 LinkedIn \u00b7 2026-05-28*\n\n**Tags :** [disponibilite](../tags/disponibilite.md), [human-centric](../tags/human-centric.md), [innovation](../tags/innovation.md), [interoperability](../tags/interoperability.md), [lasting-impact](../tags/lasting-impact.md), [mentorat](../tags/mentorat.md), [opt-nc](../tags/opt-nc.md), [pedagogie](../tags/pedagogie.md), [pedagogy](../tags/pedagogy.md), [projet-tutore](../tags/projet-tutore.md), [qualites-humaines](../tags/qualites-humaines.md), [student-recommendation](../tags/student-recommendation.md), [technical-expertise](../tags/technical-expertise.md), [transmission](../tags/transmission.md), [trust-building](../tags/trust-building.md), [unc-partnership](../tags/unc-partnership.md)", "references/devi-berges": "Je voudrais adresser un remerciement tout particulier \u00e0 notre enseignant Adrien Sales. Merci pour votre bienveillance, votre \u00e9coute, pour la libert\u00e9 que vous nous avez laiss\u00e9 dans ce projet. Vous avez su nous faire confiance, nous challenger sans jamais nous freiner. Personnellement, ce projet a \u00e9t\u00e9 bien plus qu'un simple exercice de fin d'ann\u00e9e. Il m'a permis de grandir, de me r\u00e9v\u00e9ler et de me projeter diff\u00e9remment pour la suite. Alors, sinc\u00e8rement, merci.\n\n*Charg\u00e9 de projets / \u00c9tudiant-entrepreneur*\n*\u00c9tudiant M2 MIAGE UNC \u2014 Adrien intervenant p\u00e9dagogique \u00b7 YouTube \u00b7 2026-06-02*\n\n**Tags :** [disponibilite](../tags/disponibilite.md), [human-centric](../tags/human-centric.md), [lasting-impact](../tags/lasting-impact.md), [mentorat](../tags/mentorat.md), [opt-nc](../tags/opt-nc.md), [pedagogie](../tags/pedagogie.md), [pedagogy](../tags/pedagogy.md), [projet-tutore](../tags/projet-tutore.md), [qualites-humaines](../tags/qualites-humaines.md), [student-recommendation](../tags/student-recommendation.md), [transmission](../tags/transmission.md), [trust-building](../tags/trust-building.md), [unc-partnership](../tags/unc-partnership.md)", "references/didier-jean-leroux": "Excellent architect multi technologies.\n\n*IT Managing Director (DSI Ville de Noum\u00e9a)*\n*Manager direct d'Adrien (DSI Ville de Noum\u00e9a) \u00b7 LinkedIn \u00b7 2013-12-02*\n\n**Tags :** [architecture](../tags/architecture.md), [endorsement-court](../tags/endorsement-court.md), [manager-recommendation](../tags/manager-recommendation.md), [multi-technology](../tags/multi-technology.md)", "references/guillaume-bertherat": "Adrien est une personne profond\u00e9ment passionn\u00e9e par le d\u00e9veloppement et les nouvelles technologies. Son enthousiasme, sa curiosit\u00e9 et son envie de partager ses connaissances rendent le travail \u00e0 ses c\u00f4t\u00e9s particuli\u00e8rement motivant et enrichissant. Il sait transmettre sa passion avec beaucoup d'\u00e9nergie et encourage toujours \u00e0 explorer de nouvelles id\u00e9es et \u00e0 aller plus loin techniquement.\n\nC'est \u00e9galement un excellent tuteur, toujours disponible, \u00e0 l'\u00e9coute et impliqu\u00e9 dans l'accompagnement des personnes avec qui il travaille. Il prend le temps d'expliquer, de conseiller et de challenger de mani\u00e8re constructive afin de faire progresser aussi bien techniquement qu'humainement.\n\n*Responsable technique & D\u00e9veloppeur senior chez Sopra Steria*\n*Stagiaire \u2014 direct report d'Adrien \u00b7 LinkedIn \u00b7 2026-05-26*\n\n**Tags :** [curiosite](../tags/curiosite.md), [direct-report-recommendation](../tags/direct-report-recommendation.md), [disponibilite](../tags/disponibilite.md), [force-de-proposition](../tags/force-de-proposition.md), [human-centric](../tags/human-centric.md), [intern-recommendation](../tags/intern-recommendation.md), [knowledge-sharing](../tags/knowledge-sharing.md), [mentorat](../tags/mentorat.md), [opt-nc](../tags/opt-nc.md), [pedagogie](../tags/pedagogie.md), [stage](../tags/stage.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [transmission](../tags/transmission.md)", "references/ida-carapelle-goossens": "Dans le cadre de la mission ROI NC \u00e0 la Ville de Noum\u00e9a, j'ai eu le grand plaisir de travailler au sein de l'\u00e9quipe d'Adrien.\nLa confiance qu'il m'a accord\u00e9e d\u00e8s le d\u00e9part et la reconnaissance du travail accompli, ont \u00e9t\u00e9 un r\u00e9el propulseur pour mener les diff\u00e9rents chantiers et interventions. Un management AGILE, supervision avec tact et respect. Cette exp\u00e9rience au sein de son \u00e9quipe \u00e0 la Ville de Noum\u00e9a m'ont donn\u00e9 un \u00e9lan suffisant que pour d\u00e9velopper les activit\u00e9s en Nouvelle Cal\u00e9donie confiante de travailler avec des personnes combinant des qualit\u00e9s humaines et des comp\u00e9tences technologiques.\nEn effet, Adrien a de \u00ab Very high skills \u00bb et remplit les conditions du parfait DATA SCIENTISTE : des comp\u00e9tences pointues en ing\u00e9nierie logicielles, la curiosit\u00e9 intellectuelle, l'esprit d'un entrepreneur et le sens de communication et bien entendu la ma\u00eetrise de langages de programmation et du traitement de la donn\u00e9e\u2026\n(cf. www.lebigdata.fr/13 comp\u00e9tences n\u00e9cessaires pour devenir data scientist).\nG\u00e9n\u00e9rer de la synergie est aussi une de ses pr\u00e9occupations, Il a pris de son temps pour me mettre en relation avec des experts et personne int\u00e9ress\u00e9es par la DATA et l'innovation.\nAvoir le plaisir de nouveau collaborer en groupe de travail de veille ou en mission est un de mes plus vif souhait. Merci Adrien.\n\n*G\u00e9rante R.O.I. Noum\u00e9a-Tahiti \u2014 Senior Consultant BI, Open Data & Innovation Num\u00e9rique*\n*Prestataire \u2014 Adrien \u00e9tait son client (DSI Ville de Noum\u00e9a) \u00b7 LinkedIn \u00b7 2019-05-05*\n\n**Tags :** [client-relationship](../tags/client-relationship.md), [data-science](../tags/data-science.md), [leadership](../tags/leadership.md), [management-agile](../tags/management-agile.md), [mentorat](../tags/mentorat.md), [networking](../tags/networking.md), [qualites-humaines](../tags/qualites-humaines.md)", "references/james-langeron": "J'ai eu la chance de suivre l'enseignement d'Adrien dans le cadre du Master MIAGE : dans le cadre de son cours sur l'interop\u00e9rabilit\u00e9, il nous a fait travailler sur un projet tutor\u00e9 qui a mobilis\u00e9 toute la promotion, couvrant l'ensemble de la cha\u00eene de la donn\u00e9e : de l'acc\u00e8s \u00e0 la donn\u00e9e jusqu'\u00e0 la mise \u00e0 disposition d'une donn\u00e9e propre et structur\u00e9e, son exploitation (visualisation, etc) et enfin son utilisation en machine learning. Et c'est l\u00e0 toute la valeur de son enseignement : il ne transmet pas de la th\u00e9orie, mais une pratique concr\u00e8te.\n\nCe qui rend Adrien si marquant, c'est cette \u00e9nergie d\u00e9bordante d'id\u00e9es et de projets concrets, toujours ouverts. Qu'il soit au travail ou sur son temps libre, il promeut sans rel\u00e2che l'interop\u00e9rabilit\u00e9 et l'open source, montre les bons outils, et donne r\u00e9ellement envie de construire des choses propres, ouvertes et partag\u00e9es. Sa vision de l'innovation est tout simplement contagieuse.\n\nP\u00e9dagogue d'une clart\u00e9 remarquable, d'une disponibilit\u00e9 sans faille \u2014 y compris en dehors des heures de cours \u2014 et d'une expertise technique r\u00e9elle et pointue, Adrien r\u00e9unit tout ce qu'on esp\u00e8re trouver chez un enseignant.\n\nMerci Adrien pour cette exp\u00e9rience marquante !\n\n*Concepteur D\u00e9veloppeur, Province Nord \u2014 Nouvelle-Cal\u00e9donie*\n*\u00c9tudiant M2 MIAGE UNC \u2014 Adrien intervenant p\u00e9dagogique (UE Interop\u00e9rabilit\u00e9 des SI) \u00b7 LinkedIn \u00b7 2026-05-25*\n\n**Tags :** [devrel](../tags/devrel.md), [disponibilite](../tags/disponibilite.md), [innovation](../tags/innovation.md), [interoperability](../tags/interoperability.md), [knowledge-sharing](../tags/knowledge-sharing.md), [lasting-impact](../tags/lasting-impact.md), [open-source](../tags/open-source.md), [pedagogie](../tags/pedagogie.md), [pedagogy](../tags/pedagogy.md), [student-recommendation](../tags/student-recommendation.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [technical-expertise](../tags/technical-expertise.md), [transmission](../tags/transmission.md), [unc-partnership](../tags/unc-partnership.md)", "references/jean-paul-olive": "En tant que prestataire j'ai eu l'opportunit\u00e9 de travailler sur plusieurs projets avec Adrien. Il est sans doute l'un des managers techniques les plus inspirants avec qui j'ai collabor\u00e9.\n\nC'est un technophile toujours \u00e0 l'aff\u00fbt des derni\u00e8res nouveaut\u00e9s concernant l'IA, le DevOps et l'architecture logicielle. Soucieux des bonnes pratiques tant au niveau du code, de la s\u00e9curit\u00e9 et de l'architecture, il sait se montrer p\u00e9dagogue pour faire progresser son \u00e9quipe. D'ailleurs le fait qu'il dispense des cours \u00e0 l'UNC et qu'il publie r\u00e9guli\u00e8rement des articles sur dev.to et sur sa chaine Youtube en dit long sur sa motivation \u00e0 partager son savoir et son exp\u00e9rience.\n\nAu sein de sa section et m\u00eame de son service, il a su proposer des solutions originales transformant les besoins m\u00e9tiers en opportunit\u00e9s d'innovation et d'apprentissage.\n\nJe peux dire sans h\u00e9siter que c'est dans sa section que j'ai appris le plus ces derni\u00e8res ann\u00e9es.\n\n*Software Engineer \u2014 CEO @ DEVEO NC*\n*Prestataire \u2014 Adrien \u00e9tait son client \u00b7 LinkedIn \u00b7 2026-05-25*\n\n**Tags :** [architecture](../tags/architecture.md), [client-relationship](../tags/client-relationship.md), [code-quality](../tags/code-quality.md), [devrel](../tags/devrel.md), [devsecops](../tags/devsecops.md), [force-de-proposition](../tags/force-de-proposition.md), [innovation](../tags/innovation.md), [knowledge-sharing](../tags/knowledge-sharing.md), [lasting-impact](../tags/lasting-impact.md), [leadership](../tags/leadership.md), [mentorat](../tags/mentorat.md), [opt-nc](../tags/opt-nc.md), [pedagogie](../tags/pedagogie.md), [pedagogy](../tags/pedagogy.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [technical-excellence](../tags/technical-excellence.md), [transmission](../tags/transmission.md), [unc-partnership](../tags/unc-partnership.md), [veille-technologique](../tags/veille-technologique.md)", "references/jose-goue": "Pour moi, \u00e7a a \u00e9t\u00e9 une exp\u00e9rience enrichissante. Le fait d'avoir pu choisir les technologies sur lesquelles on voulait travailler, \u00e7a a \u00e9t\u00e9 quelque chose de tr\u00e8s appr\u00e9ci\u00e9.\n\nDonc au niveau du feedback sur la p\u00e9dagogie de l'intervenant, il faut reconna\u00eetre la flexibilit\u00e9 et l'adaptabilit\u00e9 du pilote de projet, donc d'Adrien. Il faut reconna\u00eetre \u00e9galement ses comp\u00e9tences et sa passion pour ce domaine, et \u00e9galement l'innovation dans la m\u00e9thode d'apprentissage.\n\nJe suis vraiment impressionn\u00e9 par la fa\u00e7on dont Adrien a pu s'adapter \u00e0 chaque \u00e9tudiant, et \u00e9galement dans l'innovation pour faire apprendre des choses \u00e0 des \u00e9tudiants.\n\n*\u00c9tudiant M2 MIAGE, Universit\u00e9 de la Nouvelle-Cal\u00e9donie*\n*\u00c9tudiant M2 MIAGE UNC \u2014 Adrien intervenant p\u00e9dagogique \u00b7 YouTube \u00b7 2025-11-24*\n\n**Tags :** [human-centric](../tags/human-centric.md), [innovation](../tags/innovation.md), [mentorat](../tags/mentorat.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [pacifique](../tags/pacifique.md), [pedagogie](../tags/pedagogie.md), [pedagogy](../tags/pedagogy.md), [student-recommendation](../tags/student-recommendation.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [transmission](../tags/transmission.md), [unc-partnership](../tags/unc-partnership.md)", "references/julie-besson": "Adrien est un expert de la transformation num\u00e9rique d'une efficacit\u00e9 rare. Il ma\u00eetrise la data, les API, l'IA, les pipelines de production, le RAG\u2026 et allie son savoir-faire pour concevoir des solutions innovantes et robustes. J'ai particuli\u00e8rement appr\u00e9ci\u00e9 son fort engagement et son esprit de collaboration qui nous ont permis de d\u00e9livrer de beaux projets. \u00c0 noter \u00e9galement ses talents de p\u00e9dagogue qui ont permis une belle promotion de ces r\u00e9alisations.\n\nAdrien ce fut un plaisir de collaborer avec toi ! Je te souhaite le meilleur pour la suite.\n\n*AI GTM Lead - CPG, Energy, Luxe & Life Sciences - Google Cloud France*\n*Prestataire \u2014 Adrien \u00e9tait son client (Google Cloud France) \u00b7 LinkedIn \u00b7 2026-06-14*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [api-fication](../tags/api-fication.md), [architecture](../tags/architecture.md), [client-relationship](../tags/client-relationship.md), [communication](../tags/communication.md), [cross-company](../tags/cross-company.md), [data](../tags/data.md), [delivery-focus](../tags/delivery-focus.md), [devrel](../tags/devrel.md), [innovation](../tags/innovation.md), [international](../tags/international.md), [pedagogie](../tags/pedagogie.md), [pedagogy](../tags/pedagogy.md), [pleasure-to-work-with](../tags/pleasure-to-work-with.md), [team-culture](../tags/team-culture.md), [technical-excellence](../tags/technical-excellence.md), [technical-expertise](../tags/technical-expertise.md), [transmission](../tags/transmission.md)", "references/ludwig-martin": "I am pleased to recommend Adrien, an outstanding engineer with a rare ability to combine deep technical expertise, curiosity, and practical execution.\n\nAdrien is always keen to explore new technologies, build meaningful POCs, and leverage public APIs to turn ideas into concrete, working solutions. He does not just follow technology trends; he understands them, tests them, and finds smart ways to apply them to real-world problems.\n\nBeyond his technical skills, Adrien is also committed to sharing knowledge. His involvement in mentoring young people in New Caledonia reflects his generosity, patience, and genuine desire to help others grow.\n\nHe is also a great person to work with: reliable, positive, supportive, and always willing to help. Adrien is both a highly skilled engineer and a great teammate, and I would gladly recommend him to any organization looking for technical excellence, innovation, and strong human values.\n\n*AI & CyberSecurity Enterprise Architect | Cloud, Governance & Risk | POC-First & Pragmatic by Design | CISSP \u2022 TOGAF \u2022 PMP \u2022 ITIL \u2022 COBIT*\n*Coll\u00e8gue \u2014 m\u00eame \u00e9quipe (OPT-NC) \u00b7 LinkedIn \u00b7 2026-05-28*\n\n**Tags :** [api-fication](../tags/api-fication.md), [curiosite](../tags/curiosite.md), [delivery-focus](../tags/delivery-focus.md), [disponibilite](../tags/disponibilite.md), [exploration-techno](../tags/exploration-techno.md), [human-centric](../tags/human-centric.md), [innovation](../tags/innovation.md), [knowledge-sharing](../tags/knowledge-sharing.md), [mentorat](../tags/mentorat.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [opt-nc](../tags/opt-nc.md), [peer-recognition](../tags/peer-recognition.md), [pleasure-to-work-with](../tags/pleasure-to-work-with.md), [pragmatisme-techno](../tags/pragmatisme-techno.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [technical-excellence](../tags/technical-excellence.md), [technical-expertise](../tags/technical-expertise.md), [transmission](../tags/transmission.md), [trust-building](../tags/trust-building.md), [veille-technologique](../tags/veille-technologique.md)", "references/m-bakop-djadja": "The first time I met Adrien Sales was when he was applying for an internship at Experian Scorex.\nDuring his internship he showed all the expected qualities of a trainee or a future collaborator.\nHis ability to integrate easily into a team, to work on new technologies and carry out the project assigned to him convinced us to offer him a permanent position in the company.\nIn the years that followed, Adrien worked in my team and showed a pronounced taste for innovation and new technologies of the Java world. He also offered us innovative solutions that are still used by our customers today. It is with regret that we have seen him choose to continue his career elsewhere.\nThat's why I strongly recommend Adrien for his dynamism, his seriousness, his high technical qualities and the good atmosphere he brings to the team.\n\n*Software Development Manager, Experian Decision Analytics*\n*Manager direct d'Adrien (Experian Decision Analytics) \u00b7 LinkedIn \u00b7 2018-10-21*\n\n**Tags :** [dynamism](../tags/dynamism.md), [innovation](../tags/innovation.md), [internship-to-hire](../tags/internship-to-hire.md), [java](../tags/java.md), [lasting-impact](../tags/lasting-impact.md), [manager-recommendation](../tags/manager-recommendation.md), [team-fit](../tags/team-fit.md), [technical-excellence](../tags/technical-excellence.md)", "references/malcolm-bertaina": "J'ai eu l'occasion de conna\u00eetre Adrien Sales lors d'un projet tutor\u00e9 organis\u00e9 conjointement entre l'UNC et l'OPT-NC.\nCe projet, que j'ai r\u00e9alis\u00e9 en bin\u00f4me, portait sur le d\u00e9veloppement d'une interface web permettant d'afficher les temps d'attente en agence. Il nous a \u00e9t\u00e9 propos\u00e9 par Adrien, et nous l'avons choisi car il nous semblait innovant et facile \u00e0 prendre en main.\nTout au long de ce projet, Adrien a \u00e9t\u00e9 un grand soutien, en nous donnant des r\u00e9ponses tr\u00e8s rapides, toute la semaine et m\u00eame le week-end.\n\u00c7a a \u00e9t\u00e9 un plaisir de travailler avec lui et de d\u00e9couvrir les technologies modernes et innovantes qu'il nous a fait explorer.\nJe remercie grandement Adrien pour cette collaboration et les connaissances qu'il nous a transmises\n\n*\u00c9tudiant ing\u00e9nieur 2\u00e8me ann\u00e9e \u2014 Architecture Syst\u00e8mes & R\u00e9seaux, ENSEEIHT (Toulouse)*\n*\u00c9tudiant \u2014 tuteur industriel d'Adrien (OPT-NC) sur projet tutor\u00e9 UNC \u00d7 OPT-NC \u00b7 LinkedIn \u00b7 2025-03-16*\n\n**Tags :** [innovation](../tags/innovation.md), [mentorat](../tags/mentorat.md), [opt-nc](../tags/opt-nc.md), [pedagogie](../tags/pedagogie.md), [projet-tutore](../tags/projet-tutore.md), [responsiveness](../tags/responsiveness.md), [student-recommendation](../tags/student-recommendation.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [transmission](../tags/transmission.md), [unc-partnership](../tags/unc-partnership.md)", "references/marc-rodrigues": "J'ai la chance de travailler avec Adrien, et c'est une collaboration qui rend le quotidien vraiment simple et agr\u00e9able.\n\nAdrien est quelqu'un de dynamique, impliqu\u00e9, toujours dans l'action. En dev, en DevOps ou sur des sujets de data engineering, il garde le m\u00eame r\u00e9flexe : chercher des solutions concr\u00e8tes, d\u00e9bloquer rapidement les situations et faire avancer les choses sans tourner autour.\n\nCe que j'appr\u00e9cie particuli\u00e8rement, c'est qu'on peut lui soumettre une id\u00e9e m\u00eame encore un peu floue. Il prend le temps d'\u00e9couter, de comprendre le contexte, de challenger avec justesse, et souvent il t'am\u00e8ne \u00e0 voir les choses autrement. Pas en imposant son point de vue, mais en aidant chacun \u00e0 affiner sa r\u00e9flexion. Et parfois, clairement, \u00e0 revoir sa copie dans le bon sens.\n\nSur les sujets techniques, que ce soit l'architecture, les pipelines data, les pipelines CI/CD ou le run, il a une approche tr\u00e8s pragmatique. \u00c7a va droit au but, sans complexit\u00e9 inutile. Peu de r\u00e9unions, des \u00e9changes efficaces, et des d\u00e9cisions qui permettent d'avancer vite et bien.\n\nIl y a aussi une vraie rigueur dans sa mani\u00e8re de travailler : du bon sens, des pratiques propres, une vision agile et lean aussi bien dans la construction que dans le maintien en condition op\u00e9rationnelle.\n\nC'est quelqu'un de fiable, sur qui on peut compter quand les sujets deviennent plus sensibles ou plus techniques. Il garde le cap, aide \u00e0 d\u00e9bloquer les situations et sait prendre ses responsabilit\u00e9s quand il le faut.\n\nPour finir, c'est un coll\u00e8gue comme on en croise peu, et quelqu'un qui me manquerait sinc\u00e8rement s'il venait \u00e0 partir.\n\n*Software Architect*\n*Coll\u00e8gue \u2014 m\u00eame \u00e9quipe \u00b7 LinkedIn \u00b7 2026-05-26*\n\n**Tags :** [architecture](../tags/architecture.md), [data](../tags/data.md), [delivery-focus](../tags/delivery-focus.md), [devsecops](../tags/devsecops.md), [dynamism](../tags/dynamism.md), [human-centric](../tags/human-centric.md), [lasting-impact](../tags/lasting-impact.md), [lean](../tags/lean.md), [opt-nc](../tags/opt-nc.md), [peer-recognition](../tags/peer-recognition.md), [pleasure-to-work-with](../tags/pleasure-to-work-with.md), [pragmatisme-techno](../tags/pragmatisme-techno.md), [technical-excellence](../tags/technical-excellence.md), [trust-building](../tags/trust-building.md)", "references/michel-moureaux": "I've been working with Adrien on different projects. He's an expert in software and database technologies.\nHe's got a wide range of skills (and a curiosity that make him up to date to IT)\nAnd beyond his skills he's someone it's a pleasure to work with.\n\n*RSSI, D\u00e9partement des Alpes-Maritimes*\n*Coll\u00e8gue \u2014 m\u00eame \u00e9quipe \u00b7 LinkedIn \u00b7 2015-07-02*\n\n**Tags :** [broad-skills](../tags/broad-skills.md), [curiosite](../tags/curiosite.md), [database](../tags/database.md), [peer-recognition](../tags/peer-recognition.md), [pleasure-to-work-with](../tags/pleasure-to-work-with.md), [technical-expertise](../tags/technical-expertise.md)", "references/michele-barre": "Cela fait pr\u00e8s de 4 ans que j'ai le plaisir de travailler avec Adrien au sein de la DSI de la Ville de Noum\u00e9a.\n\nIl a tout d'abord \u00e9t\u00e9 mon manager au d\u00e9partement Maintenance et D\u00e9veloppement.\nToujours disponible pour m'apporter son aide et ses conseils, Adrien m'a rapidement donn\u00e9 la confiance et l'autonomie indispensables \u00e0 un travail en \u00e9quipe efficace.\nTr\u00e8s \u00e0 l'\u00e9coute des aspirations de ses agents tout en tenant compte des besoins d'\u00e9volution du syst\u00e8me d'information de la Ville, il a su maintenir au sein de son d\u00e9partement une ambiance de travail agr\u00e9able et motivante.\n\nAdrien est \u00e0 pr\u00e9sent architecte logiciel au sein du Service Ing\u00e9nierie Maintenance et Production et continue \u00e0 motiver et conseiller l'\u00e9quipe.\nDe par son exp\u00e9rience professionnelle et sa passion pour la veille technologique, il est force de proposition et a toujours une solution technique \u00e9l\u00e9gante et innovante aux probl\u00e9matiques et contraintes des projets.\n\nPour conclure, je peux dire que j'appr\u00e9cie de travailler avec Adrien et je ne peux que recommander une collaboration avec lui\n\n*Software Engineer at OPT New Caledonia (aujourd'hui) \u2014 \u00e0 l'\u00e9poque membre de l'\u00e9quipe d'Adrien \u00e0 la DSI Ville de Noum\u00e9a*\n*Direct report d'Adrien pendant 4 ans (DSI Ville de Noum\u00e9a) \u00b7 LinkedIn \u00b7 2018-10-24*\n\n**Tags :** [architecture-logicielle](../tags/architecture-logicielle.md), [autonomy](../tags/autonomy.md), [direct-report-recommendation](../tags/direct-report-recommendation.md), [dsi-noumea](../tags/dsi-noumea.md), [force-de-proposition](../tags/force-de-proposition.md), [innovation](../tags/innovation.md), [leadership](../tags/leadership.md), [management](../tags/management.md), [team-culture](../tags/team-culture.md), [trust-building](../tags/trust-building.md), [veille-technologique](../tags/veille-technologique.md)", "references/morgan-carre": "Adrien a \u00e9t\u00e9 \u00e0 la fois mon tuteur dans un projet r\u00e9alis\u00e9 dans le cadre de ma licence et mon manager lors de mon stage de 3\u1d49 ann\u00e9e de licence.\nMon stage dans son \u00e9quipe a \u00e9t\u00e9 ma premi\u00e8re exp\u00e9rience professionnelle dans le monde de l'informatique, et gr\u00e2ce \u00e0 ses pr\u00e9cieux conseils et \u00e0 sa disponibilit\u00e9 (m\u00eame en soir\u00e9e et le week-end), j'ai pu \u00e9voluer tr\u00e8s rapidement sur diff\u00e9rentes technologies qui m'\u00e9taient inconnues.\nAdrien a \u00e9t\u00e9 pour moi un mentor, toujours \u00e0 l'\u00e9coute et pr\u00eat \u00e0 me guider avec p\u00e9dagogie.\nJe serais d'ailleurs tr\u00e8s heureux d'avoir l'opportunit\u00e9 de retravailler avec lui \u00e0 l'avenir.\n\n*\u00c9tudiant \u00e0 Polytech Nice Sophia*\n*\u00c9tudiant puis stagiaire \u2014 Adrien tuteur de projet de licence puis manager de stage (OPT-NC) \u00b7 LinkedIn \u00b7 2025-03-17*\n\n**Tags :** [disponibilite](../tags/disponibilite.md), [intern-recommendation](../tags/intern-recommendation.md), [mentorat](../tags/mentorat.md), [opt-nc](../tags/opt-nc.md), [pedagogie](../tags/pedagogie.md), [polytech-nice](../tags/polytech-nice.md), [premiere-experience-pro](../tags/premiere-experience-pro.md), [stage](../tags/stage.md), [student-recommendation](../tags/student-recommendation.md), [transmission](../tags/transmission.md)", "references/paul-monimeau": "J'ai eu la chance de travailler avec Adrien lors d'une exp\u00e9rience particuli\u00e8rement enrichissante autour de projets data et innovation. Adrien sait transmettre sa vision, faire confiance et cr\u00e9er un environnement o\u00f9 l'on apprend vite tout en gardant un vrai sens du concret.\n\nSon approche m\u00ealant exigence technique, innovation et m\u00e9thodes de travail agiles m'a beaucoup apport\u00e9. Au-del\u00e0 de ses comp\u00e9tences, j'ai particuli\u00e8rement appr\u00e9ci\u00e9 son \u00e9nergie, sa capacit\u00e9 \u00e0 f\u00e9d\u00e9rer et son envie constante de faire progresser les \u00e9quipes.\n\nJe recommande Adrien avec grand plaisir et serais ravi de collaborer \u00e0 nouveau avec lui.\n\n*Ing\u00e9nieur en Informatique*\n*Direct report d'Adrien \u00b7 LinkedIn \u00b7 2026-06-04*\n\n**Tags :** [api-fication](../tags/api-fication.md), [data](../tags/data.md), [data-science](../tags/data-science.md), [direct-report-recommendation](../tags/direct-report-recommendation.md), [dynamism](../tags/dynamism.md), [innovation](../tags/innovation.md), [leadership](../tags/leadership.md), [management-agile](../tags/management-agile.md), [mentorat](../tags/mentorat.md), [mobile](../tags/mobile.md), [team-culture](../tags/team-culture.md), [technical-excellence](../tags/technical-excellence.md), [technical-expertise](../tags/technical-expertise.md), [transmission](../tags/transmission.md), [trust-building](../tags/trust-building.md)", "references/richard-deplanque": "Adrien a travaill\u00e9 \u00e0 la DSI de la mairie de Noum\u00e9a sous ma responsabilit\u00e9. Cette collaboration a dur\u00e9 un peu plus de 7 ans. Il \u00e9tait responsable du d\u00e9partement maintenance et d\u00e9veloppement et assurait \u00e9galement le r\u00f4le d'architecte logiciel. Adrien s'est r\u00e9v\u00e9l\u00e9 \u00eatre un collaborateur tr\u00e8s efficace, un travailleur acharn\u00e9 et un architecte logiciel performant. Il a \u00e9galement assur\u00e9 mon int\u00e9rim lors de mes absences.\n\nLa capacit\u00e9 d'Adrien \u00e0 mener \u00e0 leur terme dans les d\u00e9lais les t\u00e2ches qui lui \u00e9taient assign\u00e9es m'a fait forte impression. Il a su \u00eatre moteur et innovant dans la d\u00e9marche d'industrialisation du d\u00e9veloppement \u00e0 la DSI de la mairie de Noum\u00e9a. Adrien a \u00e9galement montr\u00e9 qu'il pouvait manager une \u00e9quipe.\n\nMais par-dessus tout, Adrien est un collaborateur tr\u00e8s consciencieux et au fort potentiel. Je suis convaincu qu'il a en main tous les atouts pour r\u00e9ussir. Je recommande Adrien pour toute fonction d'architecte logiciel et supervision d'\u00e9quipe de d\u00e9veloppement.\n\n*Charg\u00e9 \u00e9tudes d'architecture et qualit\u00e9 \u00e0 la DSI (Ville de Noum\u00e9a)*\n*Manager direct d'Adrien pendant 7+ ans (DSI Ville de Noum\u00e9a) \u00b7 LinkedIn \u00b7 2018-10-23*\n\n**Tags :** [architecture-logicielle](../tags/architecture-logicielle.md), [delivery-focus](../tags/delivery-focus.md), [industrialisation](../tags/industrialisation.md), [innovation](../tags/innovation.md), [interim-management](../tags/interim-management.md), [leadership](../tags/leadership.md), [long-term-collaboration](../tags/long-term-collaboration.md), [management](../tags/management.md), [manager-recommendation](../tags/manager-recommendation.md)", "references/romain-pelizzo": "Tr\u00e8s bon formateur, gr\u00e2ce \u00e0 lui, j'ai pu monter rapidement en comp\u00e9tences sur la cr\u00e9ation et le fonctionnement des API ainsi que sur leurs appels.\n\nJ'ai \u00e9galement acquis des connaissances sur de nouvelles technologies, notamment le framework Java Quarkus et SFTPGo, une technologie permettant de g\u00e9rer des comptes SFTP.\n\nEt bien d'autres encore. \ud83d\udc4c\n\n*Concepteur / D\u00e9veloppeur d'Applications*\n*Direct report d'Adrien (OPT-NC) \u00b7 LinkedIn \u00b7 2026-05-28*\n\n**Tags :** [api-design](../tags/api-design.md), [api-fication](../tags/api-fication.md), [direct-report-recommendation](../tags/direct-report-recommendation.md), [exploration-techno](../tags/exploration-techno.md), [java](../tags/java.md), [knowledge-sharing](../tags/knowledge-sharing.md), [mentorat](../tags/mentorat.md), [opt-nc](../tags/opt-nc.md), [pedagogie](../tags/pedagogie.md), [quarkus](../tags/quarkus.md), [tech-enthusiasm](../tags/tech-enthusiasm.md), [transmission](../tags/transmission.md)", "references/ronny-soutart": "J'ai eu l'occasion et la chance de travailler au sein de l'\u00e9quipe d'Adrien. Je le recommande pour son expertise et ses comp\u00e9tences de tr\u00e8s haut niveau dans de multiples domaines aussi bien techniques que cr\u00e9atives.\n\nD'une curiosit\u00e9 sans fin et entra\u00eenante, le terme \"tech enthusiast\" prend ici tout son sens. Gr\u00e2ce \u00e0 Adrien, j'ai pu exploiter mes comp\u00e9tences au maximum et au-del\u00e0 et en acqu\u00e9rir des nouvelles comme le d\u00e9veloppement mobile ou les aspects DevOps par exemple.\n\nDe par les objectifs clairs et pr\u00e9cis et aid\u00e9 d'une m\u00e9thodologie d'une efficacit\u00e9 \u00e9prouv\u00e9e de maintes fois durant ma mission, ont permis de mener \u00e0 bien l'ensemble des projets du bureau.\n\nToujours prompt \u00e0 allier innovation et collaboration pour d\u00e9velopper des outils qui profitent au plus grand nombre. Communiquer, \u00e9changer, partager, une partie hautement importante dans une organisation qu'il applique \u00e0 merveille.\n\nAdrien met aussi un point d'honneur pour instaurer un environnement sain et serein en mettant de l'humain l\u00e0 o\u00f9 il y a tellement de technique.\n\nSes hautes capacit\u00e9s techniques et humaines en font un exemple \u00e0 suivre, dont je m'inspirerais dans mes futures projets et collaborations.\n\nUn grand merci \u00e0 Adrien pour avoir partag\u00e9 ses connaissances et convictions durant cette exp\u00e9rience professionnelle.\n\n*Software Developer chez Skazy (aujourd'hui) \u2014 \u00e0 l'\u00e9poque membre de l'\u00e9quipe d'Adrien*\n*Direct report d'Adrien (\u00e9quipe GLIA, OPT-NC) \u00b7 LinkedIn \u00b7 2021-04-14*\n\n**Tags :** [communication](../tags/communication.md), [curiosite](../tags/curiosite.md), [direct-report-recommendation](../tags/direct-report-recommendation.md), [human-centric](../tags/human-centric.md), [innovation](../tags/innovation.md), [leadership](../tags/leadership.md), [management](../tags/management.md), [mentorat](../tags/mentorat.md), [opt-nc](../tags/opt-nc.md), [team-culture](../tags/team-culture.md), [transmission](../tags/transmission.md)", "references/sabrina-verolle": "J'ai travaill\u00e9 avec Adrien au sein de la DSI de l'OPT, sur des p\u00e9rim\u00e8tres de d\u00e9veloppement compl\u00e9mentaires.\nIl a port\u00e9 plusieurs sujets structurants et innovants autour des API, de l'open data et de l'interapplicatif, avec une solide expertise technique en d\u00e9veloppement. Il a \u00e9galement contribu\u00e9 \u00e0 l'onboarding et \u00e0 l'accompagnement de nombreux stagiaires et nouvelles recrues de la DSI.\nJe retiens sa capacit\u00e9 \u00e0 faire avancer des sujets complexes, \u00e0 explorer de nouvelles approches et \u00e0 transmettre son expertise dans son domaine.\n\n*Cheffe de section SI Postal, OPT-NC*\n*Coll\u00e8gue \u2014 m\u00eame \u00e9quipe (DSI OPT-NC) \u00b7 LinkedIn \u00b7 2026-05-25*\n\n**Tags :** [api-fication](../tags/api-fication.md), [delivery-focus](../tags/delivery-focus.md), [force-de-proposition](../tags/force-de-proposition.md), [innovation](../tags/innovation.md), [interoperability](../tags/interoperability.md), [knowledge-sharing](../tags/knowledge-sharing.md), [mentorat](../tags/mentorat.md), [open-data](../tags/open-data.md), [opt-nc](../tags/opt-nc.md), [peer-recognition](../tags/peer-recognition.md), [technical-expertise](../tags/technical-expertise.md), [transmission](../tags/transmission.md)", "references/sebastien-bourlart": "Je recommande vivement Adrien pour son expertise technique et son engagement passionn\u00e9. Son statut d'expert technique ne l'emp\u00eache en rien d'\u00eatre attentif \u00e0 la satisfaction des besoins business, ou \u00e0 l'optimisation du time to market. Travailler avec Adrien est toujours un plaisir, car il apporte une expertise technique pr\u00e9cieuse. Cerise sur le g\u00e2teau, il n'h\u00e9site jamais \u00e0 se positionner sur des technologies novatrices, ce qui est un atout majeur pour mener \u00e0 bien des projets innovants.\n\n*Consultant en strat\u00e9gie et transformation num\u00e9rique*\n*Prestataire \u2014 Adrien \u00e9tait son client \u00b7 LinkedIn \u00b7 2024-08-01*\n\n**Tags :** [business-acumen](../tags/business-acumen.md), [client-relationship](../tags/client-relationship.md), [innovation](../tags/innovation.md), [leadership](../tags/leadership.md), [technical-expertise](../tags/technical-expertise.md)", "references/stephanie-bouvet": "J'ai eu l'occasion de collaborer avec Adrien dans le cadre d'un projet de service en ligne orient\u00e9 grand public, et transverse \u00e0 plusieurs organismes publics ou assimil\u00e9s.\nSon d\u00e9sir de faire progresser les services publics, son dynamisme et son exp\u00e9rience qualifi\u00e9e sont des atouts majeurs dans un \u00e9cosyst\u00e8me cal\u00e9donien qui poursuit sa transformation num\u00e9rique.\n\n*Cheffe de produit service-public.nc - Coordinatrice t\u00e9l\u00e9services chez Direction du Num\u00e9rique et de la Modernisation*\n*Collaboration cross-company (Direction du Num\u00e9rique et de la Modernisation) \u00b7 LinkedIn \u00b7 2026-06-01*\n\n**Tags :** [civic-tech](../tags/civic-tech.md), [cross-company](../tags/cross-company.md), [dynamism](../tags/dynamism.md), [force-de-proposition](../tags/force-de-proposition.md), [interoperability](../tags/interoperability.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [services-web](../tags/services-web.md), [technical-expertise](../tags/technical-expertise.md)", "references/sualeh-fatehi": "Adrien is an avid proponent of open source projects. He and I have interacted on my open source project SchemaCrawler. Of his own accord, he has created a Debian package SchemaCrawler, which makes it easy to use on Linux systems. I appreciate Adrien's contributions, and support of the open source community.\n\n*Team Builder \u00b7 Software Craftsman \u00b7 Open Source Enthusiast*\n*Mainteneur upstream \u2014 cr\u00e9ateur de SchemaCrawler ; collaboration open source cross-company \u00b7 LinkedIn \u00b7 2015-05-02*\n\n**Tags :** [community-contribution](../tags/community-contribution.md), [cross-company](../tags/cross-company.md), [debian](../tags/debian.md), [linux](../tags/linux.md), [open-source](../tags/open-source.md), [packaging](../tags/packaging.md), [schemacrawler](../tags/schemacrawler.md), [upstream-recognition](../tags/upstream-recognition.md)", "references/thouraya-sakis": "J'aurai la chance d'avoir Adrien comme enseignant \u00e0 l'universit\u00e9, et je le recommanderai vivement.\n\nAdrien se distinguera par la qualit\u00e9 de son enseignement, sa capacit\u00e9 \u00e0 vulgariser des sujets complexes et \u00e0 rendre ses cours particuli\u00e8rement clairs et accessibles. Il fera preuve d'une grande p\u00e9dagogie et d'un r\u00e9el engagement envers la r\u00e9ussite de ses \u00e9tudiants.\n\nIl abordera \u00e9galement des projets en lien avec des sujets d'actualit\u00e9 tels que la data, l'intelligence artificielle et l'interop\u00e9rabilit\u00e9, ce qui permettra de relier les enseignements th\u00e9oriques aux enjeux concrets du monde professionnel.\n\nSon \u00e9coute, sa disponibilit\u00e9 et sa volont\u00e9 d'accompagner chacun dans sa progression seront de v\u00e9ritables atouts. Gr\u00e2ce \u00e0 son approche structur\u00e9e et motivante, il cr\u00e9era un environnement d'apprentissage stimulant et enrichissant.\n\nJe garderai une excellente exp\u00e9rience de ses cours et le recommanderai sans h\u00e9sitation.\n\n*Collaboratrice ISEE-NC*\n*\u00c9tudiante \u2014 Adrien intervenant p\u00e9dagogique universitaire \u00b7 LinkedIn \u00b7 2026-05-28*\n\n**Tags :** [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [disponibilite](../tags/disponibilite.md), [human-centric](../tags/human-centric.md), [interoperability](../tags/interoperability.md), [isee-nc](../tags/isee-nc.md), [lasting-impact](../tags/lasting-impact.md), [mentorat](../tags/mentorat.md), [pedagogie](../tags/pedagogie.md), [pedagogy](../tags/pedagogy.md), [student-recommendation](../tags/student-recommendation.md), [transmission](../tags/transmission.md), [unc-partnership](../tags/unc-partnership.md)", "references/yolande-poirier": "Adrien Sales's impact in the global technology space is not just his impressive technical capability, but his fundamental drive to create, teach, and connect people and things. Based in Noum\u00e9a, New Caledonia, Adrien acts as a vital bridge between complex systems and human collaboration, demonstrating that the best technology is the one that brings communities together.\n\nAs an active and prominent member of the Neo4j Ninjas Program, Adrien was recognized as a Featured Community Member. His contributions include writing code and mentoring, committed to sharing his love for graphs through prolific blogging, releasing open-source projects, and participating in community forums to ensure that nobody in his network has to solve a problem in isolation. For Adrien, being a Ninja is not a badge of exclusivity; it is a commitment to lift others up.\n\nAdrien's presentations at Neo4j's flagship NODES conferences highlight his unique talent for \"Data Culture and Management Storytelling\". Rather than presenting dry technical slides, Adrien constructs engaging narratives that make complex concepts universally accessible:\nNODES 2022 - \"From Game of Thrones to Information System Cartography\"\nNODES 24 - \"Cloud-Native Knowledge Graph Automation to Deliver AI Agents API\"\n\nAt his core, Adrien is a builder of human connections. Whether he is guiding students as a Teacher at the University of New Caledonia, contributing over 200 articles and 1,500 interactive discussions on the DEV Community platform, or sharing open datasets on Kaggle, his work is always defined by generosity. Adrien does not just manage projects; he cultivates a warm, inclusive, and sharing-focused culture wherever he goes.\n\nAny organization, community, or academic program would be incredibly fortunate to have Adrien as a leader, mentor, and advocate. He does not just build data networks; he builds networks of people.\n\n*Senior Manager, Developer Community (Neo4j)*\n*Responsable Developer Community chez Neo4j \u2014 reconnaissance upstream via le programme Neo4j Ninjas ; relation cross-company, \u00e9quipes diff\u00e9rentes \u00b7 LinkedIn \u00b7 2026-07-22*\n\n**Tags :** [communication](../tags/communication.md), [community-contribution](../tags/community-contribution.md), [cross-company](../tags/cross-company.md), [devrel](../tags/devrel.md), [human-centric](../tags/human-centric.md), [international](../tags/international.md), [knowledge-sharing](../tags/knowledge-sharing.md), [leadership](../tags/leadership.md), [mentorat](../tags/mentorat.md), [neo4j](../tags/neo4j.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-source](../tags/open-source.md), [pedagogy](../tags/pedagogy.md), [speaker](../tags/speaker.md), [transmission](../tags/transmission.md), [upstream-recognition](../tags/upstream-recognition.md)", "skills/architecture-developpement": "**Niveau : Expert**\n\nMots-cl\u00e9s : Architecture SI, Domain-Driven Design, Spring Boot, Quarkus, Java, Go, Maven, Interop\u00e9rabilit\u00e9 (signature de carri\u00e8re depuis 12+ ans, valid\u00e9e par pairs DSI Noum\u00e9a 2018), API Design, JSON Schema, APIGEE, ZK Framework, picocli, Cobra (Go), BubbleTea, Flutter\n\n**Tags :** [api-design](../tags/api-design.md), [flutter](../tags/flutter.md), [go](../tags/go.md), [j 00e9 via Quarto \u2014 s\u00e9curit\u00e9 maritime citoyenne document\u00e9e en data science\n- Eaux de baignade Noum\u00e9a : package Python edb-noumea (PyPI v0.4.0), TUI Go, donn\u00e9es live \u2014 r\u00e9utilisation publi\u00e9e et maintenue sur data.gouv.nc\n- Pattern reproductible #techforgood : open data \u2192 scraping \u2192 dataset Kaggle \u2192 notebooks \u2192 rapport Quarto\n\n**Tags :** [civic-tech](../tags/civic-tech.md), [data](../tags/data.md), [frugal](../tags/frugal.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [pacifique](../tags/pacifique.md)", "volunteer/endoflife-date-projet-open-source-communautaire-contributeur-de-donnees": "Contribution de donn\u00e9es au projet endoflife.date, r\u00e9f\u00e9rence mondiale collaborative pour le suivi des dates de fin de vie des logiciels et composants. D\u00e9veloppement de l'int\u00e9gration Neo4j (endoflife.date-neo4j) r\u00e9f\u00e9renc\u00e9e dans le wiki officiel du projet aux c\u00f4t\u00e9s de Dynatrace et Shodan.\n- endoflife.date-neo4j r\u00e9f\u00e9renc\u00e9 dans le wiki officiel aux c\u00f4t\u00e9s de Dynatrace et Shodan\n- Contributions YAML de donn\u00e9es de fin de vie pour plusieurs composants open source, datasets Kaggle automatis\u00e9s depuis l'API endoflife.date, rapports et fonctionnalit\u00e9s geol \u2014 \u00e9cosyst\u00e8me complet b\u00e2ti autour du projet\n- Int\u00e9gration utilis\u00e9e dans la stack DevSecOps de l'OPT-NC\n\n**Tags :** [devsecops](../tags/devsecops.md), [international](../tags/international.md), [maintainer](../tags/maintainer.md), [neo4j](../tags/neo4j.md), [open-source](../tags/open-source.md)", "volunteer/station-n-commission-data-ia-membre-actif-conferencier": "Participation active \u00e0 la commission Data & IA de la Station N, hub d'open innovation et \u00e9cosyst\u00e8me tech de r\u00e9f\u00e9rence en Nouvelle-Cal\u00e9donie. Pr\u00e9sentations r\u00e9guli\u00e8res sur les projets data et IA de l'OPT-NC et de l'universit\u00e9, contribution \u00e0 la diffusion des pratiques data engineering et IA dans l'\u00e9cosyst\u00e8me local dans une d\u00e9marche d'open innovation.\n- Pr\u00e9sentation de la cartographie du SI OPT-NC par knowledge graph Neo4j\n- D\u00e9monstration de l'agent IA de cartographie du SI\n- Pr\u00e9sentation des r\u00e9alisations des \u00e9tudiants Master MIAGE\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [data](../tags/data.md), [devrel](../tags/devrel.md), [knowledge-graph](../tags/knowledge-graph.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [pacifique](../tags/pacifique.md), [speaker](../tags/speaker.md)", "volunteer/universite-de-nouvelle-caledonie-master-miage-iae-enseignant-vacataire-module-interoperabilite-des-si": "Enseignement exerc\u00e9 enti\u00e8rement sur temps personnel, le soir apr\u00e8s le travail. Conception et animation du module Interop\u00e9rabilit\u00e9 des Syst\u00e8mes d'Information en Master MIAGE. Approche p\u00e9dagogique inspir\u00e9e de Montessori : learning by doing, projets r\u00e9els open source et open data, syllabus public sur GitHub, ressources cloud publiques. Feedbacks et suivi de promotion g\u00e9r\u00e9s en donn\u00e9es (repo GitHub d\u00e9di\u00e9). Renouvel\u00e9 pour une 2\u00e8me session, ao\u00fbt \u2192 d\u00e9cembre 2026.\n- Encadrement de ~12 \u00e9tudiants sur des projets r\u00e9els open source et open data \u2014 premi\u00e8re promotion Mars 2025\n- Conception int\u00e9grale du module et du syllabus (public sur GitHub : adriens/unc_iae_miage_interop_si_feedbacks)\n- P\u00e9dagogie double ancrage : Montessori (apprendre par la manipulation, autonomie) + Mindful Learning d'Ellen Langer (apprendre sans certitudes, questionner les r\u00e8gles \u00e9tablies, pr\u00e9sence au processus plut\u00f4t qu'au r\u00e9sultat) \u2014 les deux convergent vers la m\u00eame posture : construire sa propre compr\u00e9hension sur de vrais projets\n- Posture de mentor praticien : on construit ensemble sur de vrais projets, jamais d'explication th\u00e9orique seule \u2014 chaque \u00e9tudiant repart avec du code en prod\n- Expo des r\u00e9alisations \u00e9tudiantes en fin d'ann\u00e9e document\u00e9e sur dev.to (23 commentaires)\n- Suivi de la promotion et des feedbacks enti\u00e8rement g\u00e9r\u00e9s en donn\u00e9es via un repo GitHub d\u00e9di\u00e9\n- Approche Why-first syst\u00e9matique (Sinek) \u2014 partir du probl\u00e8me m\u00e9tier avant d'aborder la solution technique\n- Renouvel\u00e9 par l'IAE-UNC pour une 2\u00e8me session (ao\u00fbt \u2192 d\u00e9cembre 2026) \u2014 reconduction qui valide l'impact de la 1\u00e8re promotion (2 placements en institution publique cal\u00e9donienne)\n\n**Tags :** [interoperability](../tags/interoperability.md), [mentor](../tags/mentor.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [open-data](../tags/open-data.md), [open-source](../tags/open-source.md), [pacifique](../tags/pacifique.md), [pedagogy](../tags/pedagogy.md)", "work/docaposte-dba-oracle-postgresql": "DBA expert sur des plateformes nationales \u00e0 fort trafic et fort enjeu : HADOPI, Infogreffe, Jedeclare.com \u2014 infrastructure critique, donn\u00e9es sensibles, millions d'utilisateurs. Filiale num\u00e9rique du groupe La Poste.\n- D\u00e9veloppement d'un CLI Java mesurant l'\u00e9cart de synchronisation entre bases primaires et standby \u2014 outil de monitoring de la r\u00e9plication en production\n- Tuning avanc\u00e9 de bases de donn\u00e9es Oracle et PostgreSQL sur des plateformes nationales \u00e0 fort trafic\n- Automatisation des scripts de production et introduction des premi\u00e8res pratiques DevOps\n\n*P\u00e9riode : 2008-10 \u2192 2010-11*\n\n**Tags :** [architecture](../tags/architecture.md), [data](../tags/data.md), [devsecops](../tags/devsecops.md), [high-availability](../tags/high-availability.md), [international](../tags/international.md), [java](../tags/java.md)", "work/dsi-ville-de-noumea-architecte-logiciel-chef-de-section-developpement-maintenance": "9 ans d'\u00e9volution dans une \u00e9quipe de 2-3 d\u00e9veloppeurs, de la conception au leadership : chef de projet, chef de section, puis architecte logiciel. Plusieurs applications livr\u00e9es entre 2012 et 2015 sont toujours en production et en \u00e9volution en 2026.\n- Conception et d\u00e9veloppement de l'application permis de construire de la Ville de Noum\u00e9a \u2014 toujours en exploitation et en \u00e9volution 10+ ans apr\u00e8s sa livraison\n- Conception et d\u00e9veloppement de la main courante de la police municipale de Noum\u00e9a \u2014 toujours en exploitation 10+ ans apr\u00e8s sa livraison\n- Briques logicielles de base (composants r\u00e9utilisables) toujours int\u00e9gr\u00e9es dans le SI de la collectivit\u00e9 \u00e0 ce jour\n- Mise en place de la gestion de versions : d\u00e9ploiement SVN on-premise puis migration int\u00e9grale vers GitHub\n- Migration compl\u00e8te du SI applicatif : WebSphere/Windows/Oracle \u2192 Tomcat/Spring Boot/Linux/PostgreSQL \u2014 modernisation end-to-end de l'infrastructure et des applications m\u00e9tier de la collectivit\u00e9\n- Introduction de Spring Framework puis Spring Boot et ZK Framework en remplacement des frameworks maison\n- 4 ans de SCRUM : mont\u00e9e en comp\u00e9tences progressive de chef de projet \u00e0 chef de section \u2014 succ\u00e8s et \u00e9checs document\u00e9s et pr\u00e9sent\u00e9s au s\u00e9minaire DSI 2015\n- Int\u00e9rim assur\u00e9 du Charg\u00e9 d'\u00e9tudes d'architecture et qualit\u00e9 de la DSI lors de ses absences \u2014 extension de la confiance hi\u00e9rarchique au-del\u00e0 du r\u00f4le d'architecte\n- Introduction des pratiques DevOps : continuous delivery pour logiciels Windows via Chocolatey et AppVeyor, migration cloud hybride exp\u00e9riment\u00e9e d\u00e8s 2016\n- Analytics RGPD sur les bases de donn\u00e9es via SchemaCrawler et ELK Stack \u2014 cartographie dynamique des colonnes \u00e0 donn\u00e9es personnelles en dashboard Kibana\n\n*P\u00e9riode : 2010-12 \u2192 2019-03*\n\n**Tags :** [architecture](../tags/architecture.md), [data](../tags/data.md), [devsecops](../tags/devsecops.md), [interoperability](../tags/interoperability.md), [java](../tags/java.md), [management](../tags/management.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [pacifique](../tags/pacifique.md), [spring](../tags/spring.md), [team-lead](../tags/team-lead.md)", "work/experian-decision-analytics-consultant-developpeur-couche-base-de-donnees": "D\u00e9veloppement core sur le layer base de donn\u00e9es et int\u00e9gration en mode consultant chez de grands comptes. Bas\u00e9 \u00e0 Monaco.\n- Stage de fin de Mast\u00e8re Sp\u00e9cialis\u00e9 en data mining, en collaboration avec l'I3S (laboratoire CNRS \u2014 Sophia Antipolis) \u2014 transform\u00e9 en embauche directe d\u00e8s la fin du stage\n- D\u00e9veloppement du layer base de donn\u00e9es des composants Decision Analytics, d\u00e9ploy\u00e9s chez Orange, Bank of America et Le Cr\u00e9dit Lyonnais\n- Tuning Oracle avanc\u00e9 (indexes, tablespaces, partitionnement) pour maximiser les performances du logiciel en production chez les grands comptes\n- Conception du syst\u00e8me de monitoring JMX des bases de donn\u00e9es, outill\u00e9 via ManageEngine \u2014 avanc\u00e9e majeure en observabilit\u00e9 et int\u00e9gration pour les clients (Orange, BofA, Cr\u00e9dit Lyonnais), initiative innovante pour l'\u00e9poque\n\n*P\u00e9riode : 2003-09 \u2192 2008-09*\n\n**Tags :** [architecture](../tags/architecture.md), [data](../tags/data.md), [fintech](../tags/fintech.md), [international](../tags/international.md), [java](../tags/java.md), [monaco](../tags/monaco.md)", "work/opt-nc-office-des-postes-et-telecommunications-de-nouvelle-caledonie-chef-de-section-glia-genie-logiciel-inter-applicatif": "Pilotage de la section GLIA (6 personnes) : interop\u00e9rabilit\u00e9 du SI, data engineering, DevSecOps, cartographie du SI par knowledge graph, Developer Relations et innovation. Management d'\u00e9quipe, formation de stagiaires et mentorat. L'interop\u00e9rabilit\u00e9 comme posture est une signature de carri\u00e8re depuis 2013+ \u2014 d\u00e9j\u00e0 identifi\u00e9e par mes pairs \u00e0 la DSI de Noum\u00e9a, formalis\u00e9e aujourd'hui dans le r\u00f4le GLIA (G\u00e9nie Logiciel Inter-Applicatif) et l'enseignement en Master MIAGE.\n- Stack data compl\u00e8te en production : Airflow conteneuris\u00e9 sur Kubernetes, Lakehouse DuckLake, Superset (dataviz), MinIO (stockage) \u2014 pipeline bout en bout op\u00e9rationnel\n- Cartographie du SI par knowledge graph Neo4j avec release automatis\u00e9e via GitHub Actions \u2014 pr\u00e9sent\u00e9 \u00e0 NODES 2022 et NODES 2024 (conf\u00e9rence internationale Neo4j), enrichi d'agents IA\n- Stabilisation et rationalisation du bus applicatif Kafka pour un SI hautement disponible et performant\n- Culture DevSecOps compl\u00e8te : GitHub Actions, Quarkus, conteneurisation Podman/Docker, shift-left security avec geol (open source, 1 300+ downloads) int\u00e9grant Trivy, Quarto et DuckDB\n- D\u00e9ploiement et animation du portail API APIGEE grand public : conception, DevRel, vid\u00e9os et documentation\n- Animation des organisations OPT-NC sur GitHub (https://github.com/opt-nc), Dev.to (https://dev.to/optnc), Kaggle (https://www.kaggle.com/optnouvellecaldonie) et Hugging Face (https://huggingface.co/opt-nc) : code open source, articles techniques, datasets, notebooks, applications Gradio et MCPs \u2014 d\u00e9mo publique : candidature via MCP Claude en 20 minutes\n- CLI mobitag en Go pour envoyer des SMS via l'API Mobitag \u2014 distribu\u00e9 via Homebrew/goreleaser, con\u00e7u avec l'\u00e9quipe comme exercice p\u00e9dagogique\n- Design, d\u00e9veloppement et livraison de l'API domaine.nc (noms de domaine .NC) expos\u00e9e sur la marketplace APIGEE \u2014 a permis la cr\u00e9ation d'une application mobile open source Flutter par la communaut\u00e9, publi\u00e9e sur le Google Play Store, test\u00e9e en crowdtesting via Hightest/Testeum, avec 25 releases et une playlist YouTube d\u00e9di\u00e9e\n- Mentorat de proximit\u00e9 : stagiaires accueillis dans le bureau, embarqu\u00e9s sur de vrais projets d\u00e8s le premier jour \u2014 plusieurs recrut\u00e9s en CDI \u00e0 l'issue\n- Tuteur industriel (OPT-NC) de projets tutor\u00e9s UNC : dataviz temps d'attente en agence sur matrice LED IoT Pimoroni Cosmic Unicorn 32\u00d732 pixels (Python/MicroPython, API APIGEE) \u2014 publi\u00e9 sur Hackster.io, vid\u00e9o YouTube, article Dev.to\n- Tuteur industriel (OPT-NC) de projets tutor\u00e9s UNC : dashboard Streamlit temps d'attente API-driven (Docker, API APIGEE) \u2014 affichage du temps r\u00e9el et tendance journali\u00e8re pour optimiser la venue en agence\n- \u00c9vang\u00e9lisation technique aupr\u00e8s des coll\u00e8gues : faire d\u00e9couvrir et adopter des pratiques et technologies actionnables au quotidien \u2014 par la d\u00e9monstration et le faire ensemble, jamais par la th\u00e9orie seule\n\n*P\u00e9riode : 2019-04 \u2192 pr\u00e9sent*\n\n**Tags :** [ai-agents](../tags/ai-agents.md), [architecture](../tags/architecture.md), [data](../tags/data.md), [devrel](../tags/devrel.md), [devsecops](../tags/devsecops.md), [interoperability](../tags/interoperability.md), [knowledge-graph](../tags/knowledge-graph.md), [management](../tags/management.md), [mentor](../tags/mentor.md), [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [pacifique](../tags/pacifique.md), [team-lead](../tags/team-lead.md)", "work/vice-rectorat-de-nouvelle-caledonie-professeur-vacataire-de-mathematiques": "Enseignement des math\u00e9matiques en coll\u00e8ge : coll\u00e8ge de Bourail, puis coll\u00e8ges de Rivi\u00e8re Sal\u00e9e et Kam\u00e9r\u00e9 \u00e0 Noum\u00e9a. Admissible au CAPES externe de Math\u00e9matiques (session 2000). P\u00e9riode fondatrice pour la p\u00e9dagogie et la transmission, aujourd'hui prolong\u00e9e dans l'enseignement en Master MIAGE \u00e0 l'UNC.\n- Premi\u00e8re exp\u00e9rience d'enseignement qui ancre une posture p\u00e9dagogique durable, 25 ans avant les cours en Master MIAGE\n- D\u00e9couverte de la transmission comme discipline : concevoir des strat\u00e9gies pour ancrer le raisonnement \u2014 d\u00e9rouler une d\u00e9monstration de g\u00e9om\u00e9trie, organiser des jeux de calcul mental \u2014 apprendre \u00e0 faire construire une pens\u00e9e plut\u00f4t qu'\u00e0 la dicter\n\n*P\u00e9riode : 1999-09 \u2192 2001-08*\n\n**Tags :** [nouvelle-caledonie](../tags/nouvelle-caledonie.md), [pacifique](../tags/pacifique.md), [pedagogy](../tags/pedagogy.md)"}, "types": ["Award", "Certificate", "Education", "Interest", "Profile", "Project", "Publication", "Reference", "Skill", "Tag", "Volunteer", "Work Experience"], "palette": {"BigQuery Dataset": "#8b5cf6", "BigQuery Table": "#3b82f6", "Reference": "#10b981"}};
</script>
<script>
(function () {
  const bundle = window.BUNDLE;
  const bundleName = window.BUNDLE_NAME;
  document.title = `${bundleName} — OKF Viewer`;
  document.getElementById("bundle-name").textContent = bundleName;

  // Populate type filter
  const typeSelect = document.getElementById("filter-type");
  for (const t of bundle.types) {
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  }

  // Build reverse-link index for backlinks
  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  // Look up node label/type by id
  const nodeIndex = {};
  for (const n of bundle.nodes) nodeIndex[n.data.id] = n.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#0f172a",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#0f172a",
        },
      },
      {
        selector: "node:selected",
        style: {
          "border-width": 3,
          "border-color": "#f59e0b",
        },
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.9,
        },
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#f59e0b",
          "target-arrow-color": "#f59e0b",
          "width": 2.5,
        },
      },
      {
        selector: ".dim",
        style: { "opacity": 0.15 },
      },
    ],
    layout: { name: "cose", animate: false, padding: 30 },
    wheelSensitivity: 0.2,
  });

  cy.on("tap", "node", (evt) => showDetail(evt.target.id()));
  cy.on("tap", (evt) => {
    if (evt.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", (e) => {
    cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      const d = n.data();
      const hay =
        (d.label || "").toLowerCase() + " " +
        d.id.toLowerCase() + " " +
        (d.tags || []).join(" ").toLowerCase();
      n.toggleClass("dim", !hay.includes(q));
    });
    cy.edges().forEach((edge) => {
      const src = edge.source();
      const tgt = edge.target();
      edge.toggleClass("dim", src.hasClass("dim") || tgt.hasClass("dim"));
    });
  });

  document.getElementById("filter-type").addEventListener("change", (e) => {
    const t = e.target.value;
    if (!t) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach((n) => {
      n.toggleClass("dim", n.data("type") !== t);
    });
    cy.edges().forEach((edge) => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    if (node) node.select();

    document.getElementById("detail-empty").hidden = true;
    const content = document.getElementById("detail-content");
    content.hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;

    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resourceEl = document.getElementById("detail-resource");
    resourceEl.innerHTML = "";
    if (data.resource) {
      const a = document.createElement("a");
      a.href = data.resource;
      a.textContent = data.resource;
      a.target = "_blank";
      a.rel = "noopener";
      a.className = "external";
      resourceEl.appendChild(a);
    } else {
      resourceEl.textContent = "—";
    }

    const tagsEl = document.getElementById("detail-tags");
    tagsEl.innerHTML = "";
    if (data.tags && data.tags.length) {
      for (const t of data.tags) {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = t;
        tagsEl.appendChild(span);
      }
    } else {
      tagsEl.textContent = "—";
    }

    const body = bundle.bodies[conceptId] || "";
    const html = marked.parse(body, { breaks: false, gfm: true });
    const bodyEl = document.getElementById("detail-body");
    bodyEl.innerHTML = html;
    rewriteInternalLinks(bodyEl);

    const bl = backlinks[conceptId] || [];
    const blSection = document.getElementById("detail-backlinks");
    const blList = document.getElementById("backlinks-list");
    blList.innerHTML = "";
    if (bl.length) {
      blSection.hidden = false;
      for (const src of bl) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = nodeIndex[src]?.label || src;
        a.dataset.target = src;
        a.addEventListener("click", () => showDetail(src));
        li.appendChild(a);
        const muted = document.createElement("span");
        muted.className = "muted";
        muted.textContent = ` (${src})`;
        li.appendChild(muted);
        blList.appendChild(li);
      }
    } else {
      blSection.hidden = true;
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.0) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach((a) => {
      const href = a.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && href.endsWith(".md")) {
        const target = href.slice(1, -3);
        if (nodeIndex[target]) {
          a.className = "internal";
          a.setAttribute("href", "javascript:void(0)");
          a.addEventListener("click", (e) => {
            e.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      a.className = "external";
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    });
  }

  // Auto-show the first node (a dataset if available, else first concept)
  const initial =
    bundle.nodes.find((n) => n.data.type === "BigQuery Dataset") ||
    bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
})();

</script>
</body>
</html>
